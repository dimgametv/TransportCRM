    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Akshar's Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLSOpqIBUdvCFy8C2drX16aKzeUO9Wps4",
            authDomain: "omnicrm-0611.firebaseapp.com",
            databaseURL: "https://omnicrm-0611-default-rtdb.firebaseio.com",
            projectId: "omnicrm-0611",
            storageBucket: "omnicrm-0611.firebasestorage.app",
            messagingSenderId: "589912209026",
            appId: "1:589912209026:web:3eb29be71c19f3935f269b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global function for connecting Live GPS
        window.connectLiveGPS = function(driverId) {
            const btn = document.getElementById('sim-btn');
            if(btn) {
                btn.innerHTML = '<i data-lucide="satellite" class="inline w-4 h-4 mr-1 animate-pulse"></i> Connected Live';
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-emerald-700', 'hover:bg-blue-700');
                lucide.createIcons();
            }

            const driverRef = ref(db, 'tracking/' + driverId);
            onValue(driverRef, (snapshot) => {
                const data = snapshot.val();
                if (data && window.truckMarker && window.mapInstance) {
                    const newPos = [data.lat, data.lng];
                    window.truckMarker.setLatLng(newPos);
                    window.mapInstance.panTo(newPos, { animate: true, duration: 1 });
                    console.log("Live Location Update:", newPos);
                } else {
                    console.log("Waiting for driver's GPS signal...");
                }
            });
        };
    </script>

    <script>
        tailwind.config = {

        .field-input:focus { border-color: #4f46e5; }

        .dark .field-input:focus { border-color: #818cf8; }
        .btn-primary { padding: clamp(10px, 3vw, 16px); font-weight: 700; transition: transform 0.1s; }

        .badge { padding: 4px 8px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }

<script>
// --- LOCAL DB LOGIC ---
const today = () => new Date().toISOString().split('T')[0];
const fmt = n => '₹' + parseFloat(n).toLocaleString('en-IN');

function seedDB() {
    if (localStorage.getItem('ot_seeded')) return;
    const dbData = {
        vehicles: [{ id: 'V1', number: 'RJ-14-GD-1234', type: '10-Wheeler', capacity: '15 Ton', status: 'Active' }],
        drivers: [{ id: 'D1', name: 'Ramesh Singh', phone: '9876543210', license: 'RJ1420101234567', salaryType: 'Fixed', baseSalary: 15000 }],
        trips: [
            { id: 'T1', vehicleId: 'V1', driverId: 'D1', origin: 'Jaipur', dest: 'Delhi', freightAmount: 25000, advance: 5000, date: today(), status: 'Completed' },
            { id: 'T2', vehicleId: 'V1', driverId: 'D1', origin: 'Delhi', dest: 'Mumbai', freightAmount: 45000, advance: 10000, date: today(), status: 'Ongoing' }
        ],
        expenses: [{ id: 'E1', type: 'Fuel', amount: 8000, vehicleId: 'V1', date: today(), notes: 'Reliance Pump' }]
    };
    Object.keys(dbData).forEach(k => localStorage.setItem('ot_'+k, JSON.stringify(dbData[k])));
    localStorage.setItem('ot_company_name', 'OmniTransport');
    localStorage.setItem('ot_seeded', '1');
}
seedDB();

const db = {
    get: k => JSON.parse(localStorage.getItem('ot_'+k)) || [],
    set: (k, v) => localStorage.setItem('ot_'+k, JSON.stringify(v)),
    push: function(k, item) { const d = this.get(k); d.push(item); this.set(k, d); }
};

let chartInstance = null;
let currentDetailData = null;
window.mapInstance = null;
window.truckMarker = null;

// --- UTILITIES ---
function updateCompanyName(val) {
    localStorage.setItem('ot_company_name', val);
    const sidebarTitle = document.getElementById('sidebar-company-name');
    if (sidebarTitle) sidebarTitle.innerText = val || 'OmniTransport';
}

function showFabMenu() { document.getElementById('fab-menu').classList.remove('hidden'); }
function closeFabMenu() { document.getElementById('fab-menu').classList.add('hidden'); }

function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('ot_theme', isDark ? 'dark' : 'light');
    updateThemeIcon();
}

function updateThemeIcon() {
    const isDark = document.documentElement.classList.contains('dark');
    const icon = document.getElementById('theme-icon');
    if (icon) { icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon'); lucide.createIcons(); }
}

function viewDetails(type, id) { currentDetailData = { type, id }; switchTab('details'); }

// --- DATA BACKUP ---
function exportData() {
    const data = { vehicles: db.get('vehicles'), drivers: db.get('drivers'), trips: db.get('trips'), expenses: db.get('expenses'), companyName: localStorage.getItem('ot_company_name'), gstNo: localStorage.getItem('ot_gst_no') };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `OmniTransport_Backup_${today()}.json`; a.click(); URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.vehicles) db.set('vehicles', data.vehicles); if (data.drivers) db.set('drivers', data.drivers);
            if (data.trips) db.set('trips', data.trips); if (data.expenses) db.set('expenses', data.expenses);
            if (data.companyName) localStorage.setItem('ot_company_name', data.companyName); if (data.gstNo) localStorage.setItem('ot_gst_no', data.gstNo);
            alert('Data restored successfully!'); location.reload();
        } catch (error) { alert('Invalid backup file. Please try again.'); }
    };
    reader.readAsText(file);
}

// --- NAVIGATION & RENDERING ---
function switchTab(tab) {
    document.querySelectorAll('#desktop-sidebar button').forEach(b => {
        if(b.id !== 'side-tracking') { b.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400'); } 
        else { b.classList.remove('bg-emerald-50', 'dark:bg-emerald-900/30', 'text-emerald-600', 'dark:text-emerald-400'); b.classList.add('text-slate-500'); }
    });
    
    const sb = document.getElementById('side-' + tab);
    if(sb) {
        if(tab === 'tracking') { sb.classList.remove('text-slate-500'); sb.classList.add('bg-emerald-50', 'dark:bg-emerald-900/30', 'text-emerald-600', 'dark:text-emerald-400'); } 
        else { sb.classList.add('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400'); }
    }

    let titleText = tab.replace('-', ' ').toUpperCase();
    if(tab === 'dashboard') titleText = 'HOME';
    if(tab === 'details' && currentDetailData) titleText = currentDetailData.type.toUpperCase() + ' INFO';
    if(tab === 'tracking') titleText = 'LIVE TRACKING';
    
    document.getElementById('app-title').innerText = titleText;
    document.getElementById('main-content').innerHTML = `<div class="animate-in w-full space-y-4 flex flex-col h-full">${renderPage(tab)}</div>`;
    lucide.createIcons(); updateThemeIcon();
    
    if(tab === 'reports') setTimeout(initChart, 100);
    if(tab === 'tracking') setTimeout(initMap, 100);
}

function renderPage(tab) {
    const vehicles = db.get('vehicles'), drivers = db.get('drivers'), trips = db.get('trips'), expenses = db.get('expenses');
    
    if (tab === 'dashboard') {
        return `
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="switchTab('vehicles')" class="glass-card p-4 rounded-xl flex flex-col items-center gap-2 border-2 border-indigo-100 dark:border-indigo-900/50"><div class="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center"><i data-lucide="truck" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest text-slate-600 dark:text-slate-300">VEHICLES</span></button>
            <button onclick="switchTab('drivers')" class="glass-card p-4 rounded-xl flex flex-col items-center gap-2 border-2 border-blue-100 dark:border-blue-900/50"><div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center"><i data-lucide="users" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest text-slate-600 dark:text-slate-300">DRIVERS</span></button>
            <button onclick="switchTab('trips')" class="glass-card p-4 rounded-xl flex flex-col items-center gap-2 border-2 border-emerald-100 dark:border-emerald-900/50"><div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center"><i data-lucide="route" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest text-slate-600 dark:text-slate-300">TRIPS</span></button>
            <button onclick="switchTab('tracking')" class="glass-card p-4 rounded-xl flex flex-col items-center gap-2 border-2 border-amber-100 dark:border-amber-900/50"><div class="w-10 h-10 bg-amber-100 dark:bg-amber-900/50 text-amber-600 dark:text-amber-400 rounded-full flex items-center justify-center"><i data-lucide="map" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest text-slate-600 dark:text-slate-300">TRACKING</span></button>
        </div>
        <h3 class="font-black text-slate-400 pt-1">RECENT TRIPS</h3>
        <div class="space-y-3">${trips.slice(-3).reverse().map(t=> `<div class="glass-card p-4 rounded-xl flex justify-between items-center shadow-sm cursor-pointer" onclick="viewDetails('trip', '${t.id}')"><div><p class="font-bold text-lg">${t.origin} <i data-lucide="arrow-right" class="inline w-4 h-4"></i> ${t.dest}</p><p class="font-bold text-indigo-600 mt-1">${vehicles.find(v=>v.id===t.vehicleId)?.number || 'N/A'}</p></div><div class="text-right"><p class="font-black text-indigo-600">${fmt(t.freightAmount)}</p><span class="badge ${t.status==='Completed'?'bg-emerald-100 text-emerald-600':'bg-amber-100 text-amber-600'} text-xs mt-1 inline-block">${t.status}</span></div></div>`).join('')}</div>`;
    }

    if (tab === 'tracking') {
        const defaultTruck = vehicles[0]?.number || 'RJ-14-GD-1234';
        return `
        <div class="glass-card p-4 rounded-xl border-2 border-emerald-200 dark:border-emerald-800 flex justify-between items-center shadow-sm mb-2">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase">Selected Vehicle</p>
                <h4 class="font-black text-lg text-emerald-600 dark:text-emerald-400">${defaultTruck}</h4>
            </div>
            <button onclick="window.connectLiveGPS('D1')" id="sim-btn" class="px-4 py-2 bg-emerald-600 text-white rounded-lg font-bold shadow-md hover:bg-emerald-700 transition-colors">
                <i data-lucide="satellite" class="inline w-4 h-4 mr-1"></i> Connect Live
            </button>
        </div>
        <div class="flex-1 glass-card rounded-xl border-2 border-slate-200 dark:border-slate-700 overflow-hidden relative min-h-[400px]">
            <div id="transport-map" class="absolute inset-0 w-full h-full bg-slate-100 dark:bg-slate-800"></div>
        </div>`;
    }

    if (tab === 'reports') {
        const tFreight = trips.reduce((s,t)=>s+t.freightAmount,0), tExp = expenses.reduce((s,e)=>s+e.amount,0), net = tFreight - tExp;
        return `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
            <div class="stat-card bg-indigo-600 text-white rounded-xl border-none"><p class="font-bold opacity-80 text-[10px]">Freight</p><h3 class="font-black text-xl mt-0.5">${fmt(tFreight)}</h3></div>
            <div class="stat-card bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400"><p class="font-bold text-[10px]">Expenses</p><h3 class="font-black text-xl mt-0.5">${fmt(tExp)}</h3></div>
            <div class="stat-card bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400"><p class="font-bold text-[10px]">Net Income</p><h3 class="font-black text-xl mt-0.5">${fmt(net)}</h3></div>
            <div class="stat-card bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400"><p class="font-bold text-[10px]">Active</p><h3 class="font-black text-xl mt-0.5">${trips.filter(t=>t.status==='Ongoing').length}</h3></div>
        </div>
        <div class="glass-card p-4 rounded-xl mb-4 border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 text-center">INCOME VS EXPENSE</h3><div class="chart-container" style="height: 250px;"><canvas id="financeChart"></canvas></div></div>`;
    }

    if (tab === 'profile') {
        const companyName = localStorage.getItem('ot_company_name') || 'OmniTransport'; const gstNo = localStorage.getItem('ot_gst_no') || ''; const isDark = document.documentElement.classList.contains('dark');
        return `
        <div class="space-y-4">
            <div class="glass-card rounded-xl p-6 text-center border-2 border-slate-200 dark:border-slate-700"><div class="w-24 h-24 mx-auto bg-indigo-100 rounded-full border-4 border-indigo-500 overflow-hidden mb-4"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AksharChaudhary" class="w-full h-full"></div><h2 class="font-black text-2xl">Akshar Chaudhary</h2><p class="font-bold text-indigo-600 dark:text-indigo-400">XRV LABS · Transport Admin</p></div>
            <div class="glass-card rounded-xl p-5 border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 flex items-center gap-2"><i data-lucide="building-2" class="w-5 h-5"></i> BUSINESS DETAILS</h3><div class="space-y-4"><div><label class="text-xs font-bold text-slate-500 uppercase">Company Name</label><input type="text" value="${companyName}" class="field-input w-full mt-1" oninput="updateCompanyName(this.value)"></div><div><label class="text-xs font-bold text-slate-500 uppercase">GST Number</label><input type="text" value="${gstNo}" placeholder="Enter GSTIN" class="field-input w-full mt-1" onchange="localStorage.setItem('ot_gst_no', this.value)"></div></div></div>
            <div class="glass-card rounded-xl p-5 border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 flex items-center gap-2"><i data-lucide="sliders" class="w-5 h-5"></i> PREFERENCES</h3><div class="space-y-3"><div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg"><div class="flex items-center gap-3"><div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400 rounded flex items-center justify-center"><i data-lucide="moon" class="w-4 h-4"></i></div><span class="font-bold">Dark Mode</span></div><button onclick="toggleTheme(); switchTab('profile');" class="px-4 py-2 ${isDark ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-800'} rounded-lg font-bold text-sm transition-colors">${isDark ? 'Enabled' : 'Disabled'}</button></div></div></div>
            <div class="glass-card rounded-xl p-5 border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 flex items-center gap-2"><i data-lucide="database" class="w-5 h-5"></i> DATA MANAGEMENT</h3><div class="grid grid-cols-2 gap-3 mb-3"><button onclick="exportData()" class="p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-lg font-bold flex flex-col items-center justify-center gap-2 border border-blue-200 dark:border-blue-800 transition-colors hover:bg-blue-100"><i data-lucide="download"></i> <span class="text-sm">Export Backup</span></button><label class="p-3 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 rounded-lg font-bold flex flex-col items-center justify-center gap-2 border border-emerald-200 dark:border-emerald-800 cursor-pointer transition-colors hover:bg-emerald-100"><i data-lucide="upload"></i> <span class="text-sm">Import Backup</span><input type="file" class="hidden" accept=".json" onchange="importData(event)"></label></div><button onclick="if(confirm('Are you sure you want to wipe all data? This cannot be undone.')){localStorage.clear();location.reload();}" class="w-full p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg font-bold flex items-center justify-center gap-2 border border-red-200 dark:border-red-800 transition-colors hover:bg-red-100"><i data-lucide="trash-2" class="w-5 h-5"></i> Erase All Database Records</button></div>
            <div class="text-center pb-4"><p class="text-slate-400 font-bold text-sm">OmniTransport v1.2.0</p><p class="text-slate-500 text-xs">Developed by XRV LABS</p></div>
        </div>`;
    }

    if (tab === 'vehicles') return `<div class="flex justify-between items-center mb-4"><h3 class="font-black text-slate-400">FLEET (${vehicles.length})</h3><button onclick="alert('Add vehicle dialog')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">+ Add</button></div><div class="space-y-4">${vehicles.map(v=>`<div class="glass-card p-4 rounded-xl shadow-sm border-2 border-slate-200 dark:border-slate-700 cursor-pointer" onclick="viewDetails('vehicle', '${v.id}')"><div class="flex justify-between items-start mb-2"><div class="flex-1"><h4 class="font-black text-lg tracking-wider">${v.number}</h4><p class="font-bold text-indigo-600 dark:text-indigo-400">${v.type}</p></div><div class="text-right"><span class="badge bg-emerald-100 text-emerald-600">${v.status}</span></div></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">Capacity: ${v.capacity}</span><span class="text-xs font-bold text-slate-400">ID: ${v.id}</span></div></div>`).join('')}</div>`;
    if (tab === 'drivers') return `<div class="flex justify-between items-center mb-4"><h3 class="font-black text-slate-400">STAFF (${drivers.length})</h3><button onclick="alert('Add driver dialog')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">+ Add</button></div><div class="space-y-4">${drivers.map(d=>`<div class="glass-card p-4 rounded-xl shadow-sm border-2 border-slate-200 dark:border-slate-700 cursor-pointer" onclick="viewDetails('driver', '${d.id}')"><div class="flex justify-between items-start mb-2"><div class="flex-1"><h4 class="font-black text-lg">${d.name}</h4><p class="font-bold text-indigo-600 dark:text-indigo-400"><i data-lucide="phone" class="inline w-3 h-3"></i> ${d.phone}</p></div><div class="text-right"><span class="badge bg-blue-100 text-blue-600">${d.salaryType}</span></div></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">Lic: ${d.license || 'N/A'}</span><span class="text-xs font-bold text-slate-400">Base: ${fmt(d.baseSalary)}</span></div></div>`).join('')}</div>`;
    if (tab === 'trips' || tab === 'payments') return `<div class="flex justify-between items-center mb-4"><h3 class="font-black text-slate-400">ROUTE DETAILS</h3><button onclick="alert('Add trip dialog')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">+ Record</button></div><div class="space-y-4">${[...trips].reverse().map(t=>`<div class="glass-card p-4 rounded-xl shadow-sm border-2 ${t.status==='Ongoing'?'border-amber-200 dark:border-amber-900/50':'border-slate-200 dark:border-slate-700'} cursor-pointer" onclick="viewDetails('trip', '${t.id}')"><div class="flex justify-between items-start mb-2"><div class="flex-1"><h4 class="font-black text-lg">${t.origin} TO ${t.dest}</h4><p class="font-bold text-indigo-600 dark:text-indigo-400 mt-1">${vehicles.find(v=>v.id===t.vehicleId)?.number || 'N/A'}</p></div><div class="text-right"><h3 class="font-black text-xl text-emerald-600 dark:text-emerald-400">${fmt(t.freightAmount)}</h3><p class="text-xs font-bold text-slate-400">Adv: ${fmt(t.advance)}</p></div></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${t.date}</span>${t.status==='Ongoing'?`<button onclick="event.stopPropagation(); alert('Marked Done');" class="badge bg-amber-500 text-white border-0">Mark Done</button>`:`<span class="badge bg-emerald-100 text-emerald-600">Settled</span>`}</div></div>`).join('')}</div>`;
    if (tab === 'expenses') return `<div class="flex justify-between items-center mb-4"><h3 class="font-black text-slate-400">EXPENSES</h3><button onclick="alert('Add expense dialog')" class="btn-primary bg-red-500 text-white py-2 px-4 text-sm">+ Add</button></div><div class="space-y-4">${[...expenses].reverse().map(e=>{ const isSal = e.type === 'Salary'; const hoverColor = isSal ? 'blue' : 'red'; return `<div class="glass-card p-4 rounded-xl shadow-sm border-2 border-slate-200 dark:border-slate-700 cursor-pointer" onclick="viewDetails('expense', '${e.id}')"><div class="flex justify-between items-start mb-2"><div class="flex-1"><h4 class="font-black text-lg">${e.type.toUpperCase()}</h4><p class="font-bold text-${hoverColor}-600 dark:text-${hoverColor}-400 mt-1">${isSal ? (drivers.find(d=>d.id===e.driverId)?.name || 'N/A') : (vehicles.find(v=>v.id===e.vehicleId)?.number || 'General Expense')}</p></div><div class="text-right"><h3 class="font-black text-xl text-red-600 dark:text-red-400">-${fmt(e.amount)}</h3></div></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${e.date}</span><span class="text-xs font-bold text-slate-400 truncate max-w-[120px] text-right">${e.notes || 'ID: ' + e.id}</span></div></div>`}).join('')}</div>`;
    
    if (tab === 'details') {
        if (!currentDetailData) return `<p>Error loading.</p>`; const list = db.get(currentDetailData.type + 's'); const item = list.find(x => x.id === currentDetailData.id); if (!item) return `<p>Record not found.</p>`;
        let backTab = currentDetailData.type === 'expense' ? 'expenses' : currentDetailData.type + 's'; let chunksHtml = ''; const entries = Object.entries(item);
        for (let i = 0; i < entries.length; i += 2) {
            const chunk = entries.slice(i, i + 2); chunksHtml += '<div class="grid grid-cols-2 gap-4 p-5 border-b-2 border-slate-100 dark:border-slate-800 last:border-b-0">';
            chunk.forEach(([key, val]) => { let displayVal = typeof val === 'number' ? fmt(val) : (val || 'N/A'); chunksHtml += `<div><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">${key.replace('Id', ' ID')}</p><p class="font-black text-lg break-words">${displayVal}</p></div>`; }); chunksHtml += '</div>';
        }
        return `<div class="flex items-center gap-3 mb-6"><button onclick="switchTab('${backTab}')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl text-slate-700 dark:text-white">RECORD DETAILS</h3></div><div class="glass-card rounded-xl flex flex-col">${chunksHtml}</div>`;
    }

    return `<div class="p-6 text-center text-slate-500 font-bold">Work in progress...</div>`;
}

// --- LEAFLET MAP INITIALIZATION ---
function initMap() {
    if (window.mapInstance) { window.mapInstance.remove(); }
    const startCoords = [26.9124, 75.7873]; // Default Map Location
    
    window.mapInstance = L.map('transport-map', { zoomControl: false }).setView(startCoords, 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(window.mapInstance);

    const customIcon = L.divIcon({
        html: '<div class="w-10 h-10 bg-white border-2 border-emerald-500 rounded-full flex items-center justify-center shadow-lg text-lg animate-pulse">🚚</div>',
        className: '', iconSize: [40, 40], iconAnchor: [20, 20]
    });

    window.truckMarker = L.marker(startCoords, { icon: customIcon }).addTo(window.mapInstance);
}

function initChart() {
    const ctx = document.getElementById('financeChart'); if(!ctx) return; if(chartInstance) chartInstance.destroy();
    const trips = db.get('trips'), expenses = db.get('expenses');
    chartInstance = new Chart(ctx, { type: 'bar', data: { labels: ['Total Operations'], datasets: [ { label: 'Income', data: [trips.reduce((s,t)=>s+t.freightAmount,0)], backgroundColor: '#4f46e5', borderRadius: 5 }, { label: 'Expense', data: [expenses.reduce((s,e)=>s+e.amount,0)], backgroundColor: '#ef4444', borderRadius: 5 } ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
}

// Initial Sync
window.onload = () => {
    updateThemeIcon();
    const cName = localStorage.getItem('ot_company_name');
    if(cName) updateCompanyName(cName);
};
switchTab('dashboard');
</script>
</body>
</html>
