<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniTransport | XRV LABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: { 'sans': ['Quantico', 'sans-serif'] },
                    animation: { 'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
                    keyframes: { slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } } }
                }
            }
        }
        if (!localStorage.getItem('ot_theme')) localStorage.setItem('ot_theme', 'light');
        if (localStorage.getItem('ot_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quantico', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background-color: #f8fafc; }
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }
        
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 2px solid #e2e8f0; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        
        html, body, button, input, textarea, p, h1, h2, h3, span, div { font-size: clamp(14px, 3.5vw, 18px) !important; }
        select, select option { font-size: clamp(12px, 2.5vw, 15px) !important; }
        
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #main-header { transition: margin-top 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .field-input { padding: clamp(10px, 2.5vw, 14px); border: 2px solid #cbd5e1; outline: none; border-radius: 5px; }
        .field-input:focus { border-color: #4f46e5; }
        .dark .field-input { border-color: #475569; background: #1e293b; }
        .dark .field-input:focus { border-color: #818cf8; }
        .btn-primary { padding: clamp(10px, 3vw, 16px); font-weight: 700; border-radius: 5px; }
        .btn-primary:active { transform: translateY(2px); }
        
        .badge { padding: 3px 6px; font-size: 11px !important; font-weight: 700; text-transform: uppercase; white-space: nowrap; border-radius: 4px; }
        @media (min-width: 768px) { .badge { padding: 4px 8px; font-size: 13px !important; border-radius: 5px; } }

        .stat-card { padding: clamp(10px, 3vw, 20px); border: 2px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }
        
        #main-content { padding: 8px; padding-bottom: 90px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 2px solid #e2e8f0; }
        .dark #bottom-nav { border-top-color: #334155; }
        
        .desktop-only { display: none !important; }
        
        @media (min-width: 768px) {
            #main-content { padding: 8px; padding-bottom: 90px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .desktop-only { display: flex !important; }
        }
        .chart-container canvas { width: 100% !important; }

        .tab-switcher { display: flex; background: #e2e8f0; border-radius: 5px; padding: 4px; gap: 4px; }
        .dark .tab-switcher { background: #1e293b; }
        .tab-btn { flex: 1; padding: 10px 16px; border-radius: 5px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; color: #64748b; }
        .tab-btn.active { background: white; color: #4f46e5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .dark .tab-btn.active { background: #334155; color: #818cf8; }

        .skeleton-card { background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 5px; overflow: hidden; }
        .dark .skeleton-card { background: #1e293b; border-color: #334155; }
        .skeleton-bar { background: #e2e8f0; border-radius: 5px; }
        .dark .skeleton-bar { background: #334155; }

        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti { position: absolute; opacity: 0; }
        @keyframes confetti-fall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .onboarding-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .onboarding-spotlight { position: absolute; border-radius: 5px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.85); transition: all 0.5s ease; }
        .onboarding-tooltip { position: absolute; background: white; border-radius: 5px; padding: 24px; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10001; }
        .dark .onboarding-tooltip { background: #1e293b; }
        .onboarding-progress { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; transition: all 0.3s; }
        .onboarding-dot.active { background: #4f46e5; width: 24px; border-radius: 5px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>

// Global Badge Updater
function updateBadges() {
    const trips = db.get('trips');
    const drivers = db.get('drivers');
    
    let hasPendingTrips = trips.some(t => t.status !== 'Settled');
    let hasPendingSalary = drivers.some(d => {
        if (!d.salaryHistory || d.salaryHistory.length === 0) return false;
        return d.salaryHistory.some(s => s.total > s.paid);
    });

    const isPending = hasPendingTrips || hasPendingSalary;
    
    document.getElementById('badge-nav-dash')?.classList.toggle('hidden', !isPending);
    document.getElementById('badge-nav-trips')?.classList.toggle('hidden', !hasPendingTrips);
    document.getElementById('badge-nav-staff')?.classList.toggle('hidden', !hasPendingSalary);
    
    document.getElementById('badge-bot-dash')?.classList.toggle('hidden', !isPending);
    document.getElementById('badge-bot-reports')?.classList.toggle('hidden', !isPending);
}

    let total = 0;

    items.forEach(item => {
        if (month === 'All' || item.dataset.month === month) {
            item.style.display = '';

    } else {
        html += `<div class="space-y-3">${Array(count).fill(0).map(() => `<div class="skeleton-card p-4"><div class="flex justify-between mb-3"><div><div class="skeleton-bar h-6 w-3/4 mb-2"></div><div class="skeleton-bar h-4 w-1/2"></div></div><div class="skeleton-bar h-8 w-20 rounded-[5px]"></div></div><div class="flex justify-between pt-3 border-t-2 border-slate-100 dark:border-slate-700"><div class="skeleton-bar h-4 w-24"></div><div class="skeleton-bar h-4 w-16"></div></div></div>`).join('')}</div>`;

function createConfetti() {
    const c = document.getElementById('confetti-container'), colors = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
    for (let i = 0; i < 100; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation:confetti-fall ${Math.random()*2+2}s linear forwards;animation-delay:${Math.random()*0.5}s`;

    setTimeout(() => c.innerHTML = '', 4000);
}

function showOnboarding() {
    if (localStorage.getItem('ot_onboarding_done')) return;
    
    document.getElementById('onboarding-title').textContent = t('welcome');
    document.getElementById('onboarding-description').textContent = t('tut_desc1');
    document.getElementById('btn-tut-skip').textContent = t('skip');
    document.getElementById('btn-tut-next').textContent = t('next');
    
    document.getElementById('onboarding-overlay').classList.remove('hidden');
    updateOnboardingStep();
}

function updateOnboardingStep() {
    const steps = [
        { target: null, icon: 'sparkles', title: t('welcome'), description: t('tut_desc1'), position: 'center' },
        { target: '#main-header', icon: 'layout-dashboard', title: t('tut_head'), description: t('tut_desc2'), position: 'bottom' },
        { target: '#nav-fab', icon: 'plus-circle', title: t('tut_act'), description: t('tut_desc3'), position: 'top' },
        { target: null, icon: 'home', title: t('dash'), description: t('tut_desc4'), position: 'center' },
        { target: null, icon: 'bar-chart-2', title: t('reports'), description: t('tut_desc5'), position: 'center' }
    ];
    
    const s = steps[currentOnboardingStep], tt = document.getElementById('onboarding-tooltip'), sp = document.getElementById('onboarding-spotlight');
    document.getElementById('onboarding-title').textContent = s.title;
    document.getElementById('onboarding-description').textContent = s.description;
    document.getElementById('onboarding-step').textContent = currentOnboardingStep + 1;
    document.getElementById('onboarding-total').textContent = steps.length;
    document.getElementById('onboarding-icon').setAttribute('data-lucide', s.icon);
    document.querySelectorAll('.onboarding-dot').forEach((d, i) => d.classList.toggle('active', i === currentOnboardingStep));
    document.getElementById('btn-tut-next').textContent = currentOnboardingStep === steps.length - 1 ? t('done') : t('next');
    
    if (s.target) {
        const el = document.querySelector(s.target);
        if (el) { const r = el.getBoundingClientRect(); sp.style.cssText = `top:${r.top-8}px;left:${r.left-8}px;width:${r.width+16}px;height:${r.height+16}px;display:block`; tt.style.cssText = s.position === 'bottom' ? `top:${r.bottom+20}px;left:50%;transform:translateX(-50%)` : `bottom:${innerHeight-r.top+20}px;left:50%;transform:translateX(-50%)`; }
    } else { sp.style.display = 'none'; tt.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)'; }
    lucide.createIcons();
}

function nextOnboarding() { if (++currentOnboardingStep >= 5) { skipOnboarding(); createConfetti(); } else updateOnboardingStep(); }

function switchTab(tab, loader = true, historyAction = 'push') {
    document.querySelectorAll('#desktop-sidebar button').forEach(b => b.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400'));
    document.getElementById('side-' + tab)?.classList.add('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400');
    
    const tabTitles = { dashboard: t('home'), trips: t('trips'), vehicles: t('vehicles'), drivers: t('staff'), payments: t('payments'), expenses: t('expenses'), reports: t('reports'), profile: t('settings'), 'add-vehicle': t('add_v'), 'edit-vehicle': t('edit_v'), 'add-driver': t('add_s'), 'edit-driver': t('edit_s'), 'add-trip': t('add_t'), 'edit-trip': t('edit_t'), 'add-expense': t('add_e'), 'edit-expense': t('edit_e') };
    let title = tabTitles[tab] || tab.toUpperCase();
    if (tab === 'details' && currentDetailData) title = t('details');
    document.getElementById('app-title').innerText = title;
    
    if (historyAction === 'push') {
        history.pushState({ tab, detail: currentDetailData }, title, `#${tab}`);
    } else if (historyAction === 'replace') {
        history.replaceState({ tab, detail: currentDetailData }, title, `#${tab}`);
    }

    document.getElementById('main-header').style.marginTop = '0px';
    
    if (loader && ['dashboard', 'vehicles', 'drivers', 'trips', 'expenses', 'reports'].includes(tab)) {
        const type = tab === 'dashboard' ? 'dashboard' : tab === 'reports' ? 'stats' : tab === 'drivers' ? 'staff' : 'list';
        const count = Math.min(db.get(tab).length || 3, 4);
        
        document.getElementById('main-content').innerHTML = `<div class="w-full">${renderSkeleton(type, count)}</div>`;
        
        setTimeout(() => {
            document.getElementById('main-content').innerHTML = `<div class="w-full">${renderPage(tab)}</div>`;
            lucide.createIcons(); 
            if (tab === 'reports') setTimeout(initChart, 50);
            updateBadges();
        }, 1000);
    } else {
        document.getElementById('main-content').innerHTML = `<div class="w-full">${renderPage(tab)}</div>`;
        lucide.createIcons();
        if (tab === 'reports') setTimeout(initChart, 50);
        updateBadges();
    }
    updateThemeIcon();
}

function exportData() { const d = { vehicles: db.get('vehicles'), drivers: db.get('drivers'), trips: db.get('trips'), expenses: db.get('expenses'), companyName: localStorage.getItem('ot_company_name') }; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], { type: 'application/json' })); a.download = `OmniTransport_${today()}.json`; a.click(); }
function importData(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); ['vehicles', 'drivers', 'trips', 'expenses'].forEach(k => d[k] && db.set(k, d[k])); if (d.companyName) localStorage.setItem('ot_company_name', d.companyName); createConfetti(); location.reload(); } catch { alert('Invalid file'); } }; r.readAsText(f); }

function updateTripStatus(id, newStatus) {
    const arr = db.get('trips');
    const tr = arr.find(x => x.id === id);
    if (tr) {
        tr.status = newStatus;
        if (newStatus === 'Settled') tr.advance = tr.freightAmount;
        db.set('trips', arr);
        if (newStatus === 'Completed' || newStatus === 'Settled') createConfetti();
        switchTab('trips', true, 'replace');
    }
}

function renderListCard(type, id, content, extraClass='') {
    return `<div class="glass-card list-item-card p-4 rounded-[5px] border-2 border-slate-200 dark:border-slate-700 cursor-pointer ${extraClass}" onclick="viewDetails('${type}','${id}')">${content}</div>`;
}

function renderSearchBar(placeholder) {
    return `
        <div class="mb-4 relative">
            <input type="text" placeholder="${placeholder}" onkeyup="filterList(this.value)" class="w-full pl-10 field-input bg-white dark:bg-slate-800">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
        </div>
    `;
}

function renderStaffCard(p, all) {
    const isD = p.role === 'Driver';
    return renderListCard('driver', p.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-lg">${p.name}</h4><p class="font-bold text-indigo-600"><i data-lucide="phone" class="inline w-3 h-3"></i> ${p.phone}</p></div><span class="badge ${isD ? 'bg-emerald-100 text-emerald-600' : 'bg-purple-100 text-purple-600'}">${ts(p.salaryType)}</span></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${isD ? t('lic') + ': ' + (p.license || 'N/A') : t('office')}</span><span class="text-xs font-bold text-slate-400">${fmt(p.baseSalary)}</span></div>`);
}

function renderStaffContent() {
    const all = db.get('drivers'), list = all.filter(d => d.role === (activeStaffTab === 'drivers' ? 'Driver' : 'Worker'));
    if (!list.length) return `<div class="text-center py-12"><div class="w-16 h-16 mx-auto bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4"><i data-lucide="${activeStaffTab === 'drivers' ? 'car' : 'briefcase'}" class="w-8 h-8 text-slate-400"></i></div><p class="text-slate-500 font-bold">${t('no_staff')}</p></div>`;
    return `<div class="space-y-3">${list.map((p) => renderStaffCard(p, all)).join('')}</div>`;
}

function renderPage(tab) {
    const vehicles = db.get('vehicles'), drivers = db.get('drivers'), trips = db.get('trips'), expenses = db.get('expenses');
    
    if (tab === 'dashboard') {
        const btns = [['vehicles', 'truck', 'indigo', t('vehicles')], ['drivers', 'users', 'blue', t('staff')], ['trips', 'route', 'emerald', t('trips')], ['expenses', 'banknote', 'red', t('expenses_sm')]];
        if (!trips.length && !vehicles.length) return `<div class="grid grid-cols-2 gap-2 mb-3">${btns.map(([tt, i, c, l]) => `<button onclick="switchTab('${tt}')" class="glass-card p-4 rounded-[5px] flex flex-col items-center gap-2 border-2 border-${c}-100 dark:border-${c}-900/50"><div class="w-10 h-10 bg-${c}-100 dark:bg-${c}-900/50 text-${c}-600 rounded-[5px] flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest uppercase">${l}</span></button>`).join('')}</div>${renderEmptyState('trips')}`;
        return `<div class="grid grid-cols-2 gap-2 mb-3">${btns.map(([tt, i, c, l]) => `<button onclick="switchTab('${tt}')" class="glass-card p-4 rounded-[5px] flex flex-col items-center gap-2 border-2 border-${c}-100 dark:border-${c}-900/50"><div class="w-10 h-10 bg-${c}-100 dark:bg-${c}-900/50 text-${c}-600 rounded-[5px] flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest uppercase">${l}</span></button>`).join('')}</div><h3 class="font-black text-slate-400 mb-3">${t('recent_trips')}</h3><div class="space-y-3">${trips.slice(-3).reverse().map((tr) => {
            const badgeCls = tr.status === 'Settled' ? 'bg-emerald-100 text-emerald-600' : (tr.status === 'Completed' ? 'bg-blue-100 text-blue-600' : 'bg-amber-100 text-amber-600');
            return renderListCard('trip', tr.id, `<div class="flex justify-between items-center"><div><p class="font-bold text-lg">${tr.origin} <i data-lucide="arrow-right" class="inline w-4 h-4"></i> ${tr.dest}</p><p class="font-bold text-indigo-600 mt-1">${tr.companyName || t('free_roam')}</p></div><div class="text-right"><p class="font-black text-indigo-600">${fmt(tr.freightAmount)}</p><span class="badge ${badgeCls} mt-1 inline-block uppercase">${ts(tr.status)}</span></div></div>`);
        }).join('')}</div>`;
    }

        const tF = trips.reduce((s, tr) => s + tr.freightAmount, 0), tE = expenses.reduce((s, e) => s + e.amount, 0);
        return `<div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3"><div class="stat-card bg-indigo-600 text-white rounded-[5px] border-none"><p class="font-bold opacity-80 text-[10px]">${t('freight')}</p><h3 class="font-black text-xl">${fmt(tF)}</h3></div><div class="stat-card bg-red-50 dark:bg-red-900/20 text-red-600"><p class="font-bold text-[10px]">${t('expenses_sm')}</p><h3 class="font-black text-xl">${fmt(tE)}</h3></div><div class="stat-card bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600"><p class="font-bold text-[10px]">${t('net')}</p><h3 class="font-black text-xl">${fmt(tF - tE)}</h3></div><div class="stat-card bg-amber-50 dark:bg-amber-900/20 text-amber-600"><p class="font-bold text-[10px]">${t('active')}</p><h3 class="font-black text-xl">${trips.filter(tr => tr.status === 'Ongoing').length}</h3></div></div><div class="glass-card p-4 rounded-[5px] border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 text-center">${t('last_6_months')}</h3><div class="chart-container" style="height:250px"><canvas id="financeChart"></canvas></div></div>`;
    }

    if (tab === 'vehicles') {
        if (!vehicles.length) return renderEmptyState('vehicles');
        let html = `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-vehicle')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">${t('add')}</button></div>`;
        html += renderSearchBar(t('search_v'));
        html += `<div class="space-y-3">${vehicles.map((v) => {
            const rs = v.runningStatus || 'Stopped';

        }).join('')}</div>`;
        return html;
    }

    if (tab === 'drivers') {
        if (!drivers.length) return renderEmptyState('drivers');
        let html = `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-driver')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">${t('add')}</button></div>`;
        html += renderSearchBar(t('search_s'));
        html += `<div class="tab-switcher mb-3"><button class="tab-btn staff-tab-btn ${activeStaffTab === 'drivers' ? 'active' : ''}" data-tab="drivers" onclick="switchStaffTab('drivers')"><i data-lucide="car" class="w-4 h-4"></i>${t('drivers')}</button><button class="tab-btn staff-tab-btn ${activeStaffTab === 'workers' ? 'active' : ''}" data-tab="workers" onclick="switchStaffTab('workers')"><i data-lucide="briefcase" class="w-4 h-4"></i>${t('workers')}</button></div><div id="staff-content">${renderStaffContent()}</div>`;
        return html;
    }

    if (tab === 'trips' || tab === 'payments') {
        if (!trips.length) return renderEmptyState('trips');
        let html = `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-trip')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">${t('add')}</button></div>`;
        html += renderSearchBar(t('search_t'));
        html += `<div class="space-y-3">${[...trips].reverse().map((tr) => {
            let actionBtn = '';
            if (tr.status === 'Ongoing') actionBtn = `<button onclick="event.stopPropagation();updateTripStatus('${tr.id}', 'Completed')" class="badge bg-blue-500 text-white">${t('mark_complete')}</button>`;
            else if (tr.status === 'Completed') actionBtn = `<button onclick="event.stopPropagation();updateTripStatus('${tr.id}', 'Settled')" class="badge bg-emerald-500 text-white">${t('mark_settle')}</button>`;
            else actionBtn = `<span class="badge bg-emerald-100 text-emerald-600 uppercase">${ts('Settled')}</span>`;
            
            const clientNameClickable = `<p class="font-bold text-indigo-600 mt-1 cursor-pointer hover:underline inline-block" onclick="event.stopPropagation(); viewDetails('client', '${tr.companyName || t('free_roam')}')">${tr.companyName || t('free_roam')} <i data-lucide="external-link" class="inline w-3 h-3 text-indigo-400"></i></p>`;
            
            return renderListCard('trip', tr.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-lg">${tr.origin} → ${tr.dest}</h4>${clientNameClickable}</div><div class="text-right"><h3 class="font-black text-xl text-emerald-600">${fmt(tr.freightAmount)}</h3></div></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${tr.date}</span>${actionBtn}</div>`);
        }).join('')}</div>`;
        return html;
    }

    if (tab === 'expenses') {
        if (!expenses.length) return renderEmptyState('expenses');
        let html = `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-expense')" class="btn-primary bg-red-500 text-white py-2 px-4 text-sm">${t('add')}</button></div>`;
        html += renderSearchBar(t('search_e'));
        html += `<div class="space-y-3">${[...expenses].reverse().map((e) => { 
            let relatedTo = 'General';
            let colorClass = 'text-red-600';
            if (e.type === 'Salary') { relatedTo = drivers.find(d => d.id === e.driverId)?.name || 'N/A'; colorClass = 'text-blue-600'; }
            else if (['Fuel', 'Maintenance', 'Toll'].includes(e.type)) { relatedTo = vehicles.find(v => v.id === e.vehicleId)?.number || 'N/A'; colorClass = 'text-amber-600'; }
            else { relatedTo = e.payee || t('office'); colorClass = 'text-purple-600'; }
            
            let eTypeLabel = e.type === 'Fuel' ? t('fuel_t') : e.type === 'Maintenance' ? t('maint_t') : e.type === 'Toll' ? t('toll_t') : e.type === 'Salary' ? t('sal_t') : e.type === 'Office' ? t('off_t') : e.type === 'Shop Account' ? t('shop_t') : t('oth_t');

            return renderListCard('expense', e.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-lg uppercase">${eTypeLabel}</h4><p class="font-bold ${colorClass} mt-1">${relatedTo}</p></div><h3 class="font-black text-xl text-red-600">-${fmt(e.amount)}</h3></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${e.date}</span><span class="text-xs font-bold text-slate-400">${e.notes || e.id}</span></div>`); 
        }).join('')}</div>`;
        return html;
    }

    if (tab === 'details') {
        if (!currentDetailData) return '<p>Error</p>';
        
        let html = '';
        let back = 'dashboard';
        
        if (currentDetailData.type === 'client') {
            back = 'trips';
            const cName = currentDetailData.id === t('free_roam') ? '' : currentDetailData.id;
            const clientTrips = trips.filter(x => (x.companyName || '') === cName).sort((a,b) => new Date(b.date) - new Date(a.date));
            const tFreight = clientTrips.reduce((s,x)=>s+x.freightAmount,0);
            const tAdv = clientTrips.reduce((s,x)=>s+x.advance,0);
            const tPend = Math.max(0, tFreight - tAdv);
            
            html = `
                <div class="glass-card rounded-[5px] p-6 mb-6 text-center border-indigo-200 dark:border-indigo-800 bg-indigo-50/50 dark:bg-indigo-900/20">
                    <div class="w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-3"><i data-lucide="building" class="w-8 h-8"></i></div>
                    <h2 class="font-black text-xl uppercase tracking-wide text-indigo-700 dark:text-indigo-400">${currentDetailData.id}</h2>
                    <p class="text-xs font-bold text-slate-500 uppercase mt-1">${t('c_ledger')}</p>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <div class="stat-card p-3 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('trips')}</p>
                        <h3 class="font-black text-lg">${clientTrips.length}</h3>
                    </div>
                    <div class="stat-card p-3 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('adv')}</p>
                        <h3 class="font-black text-lg text-emerald-600">${fmt(tAdv)}</h3>
                    </div>
                    <div class="stat-card p-3 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('pending')}</p>
                        <h3 class="font-black text-lg text-amber-600">${fmt(tPend)}</h3>
                    </div>
                </div>
                <h4 class="text-xs font-black text-slate-400 tracking-widest uppercase mb-3 px-1">${t('all_trips')}</h4>
                <div class="space-y-3">
                    ${clientTrips.length === 0 ? `<p class="text-center text-slate-400 font-bold py-4">${t('no_rec')}</p>` : clientTrips.map(tr => {
                        const badgeCls = tr.status === 'Settled' ? 'bg-emerald-100 text-emerald-600' : (tr.status === 'Completed' ? 'bg-blue-100 text-blue-600' : 'bg-amber-100 text-amber-600');
                        return renderListCard('trip', tr.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-sm">${tr.origin} → ${tr.dest}</h4><p class="text-[10px] text-slate-500 mt-1">${tr.date}</p></div><div class="text-right"><h3 class="font-black text-sm text-indigo-600">${fmt(tr.freightAmount)}</h3><span class="badge ${badgeCls} mt-1 inline-block uppercase">${ts(tr.status)}</span></div></div>`);
                    }).join('')}
                </div>
            `;
            return `<div class="flex items-center gap-3 mb-4"><button onclick="goBack('${back}')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-[5px]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl uppercase">${t('details')}</h3></div><div>${html}</div>`;
        }

        const list = db.get(currentDetailData.type + 's'), item = list.find(x => x.id === currentDetailData.id);
        if (!item) return '<p>Not found</p>';
        back = currentDetailData.type === 'expense' ? 'expenses' : currentDetailData.type + 's';
        
        if (currentDetailData.type === 'vehicle') {
            const v = item;
            
            let financeHtml = '';
            if (v.hasFinance === 'Yes') {
                const total = v.totalEmis || 1;
                const paid = v.paidEmis || 0;
                const pending = Math.max(0, total - paid);
                const percent = Math.min(100, (paid / total) * 100);
                
                financeHtml = `
                    <div class="mt-6 mb-4">
                        <h4 class="text-xs font-black text-slate-400 tracking-widest uppercase mb-3 px-1">${t('fin_details')}</h4>

                                <span class="text-amber-500"><i data-lucide="clock" class="w-3 h-3 inline"></i> <span id="info-pending-val">${pending}</span> ${t('due')}</span>
                            </div>
                            <div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                                <div class="h-full bg-emerald-500 rounded-full" style="width: ${percent}%"></div>
                            </div>
                            <p class="text-center text-[10px] font-bold text-slate-400 mt-2 uppercase">${total} ${t('tot_emi')}</p>
                        </div>
                    </div>
                `;
            }

            const compBox = (title, status, expiry) => {
                let iconHtml = '';
                if (status === 'Available') {
                    const isExpired = expiry && expiry < today();
                    const iconName = isExpired ? 'x-circle' : 'check-circle';
                    const iconColor = isExpired ? 'text-rose-500' : 'text-emerald-500';
                    iconHtml = `<i data-lucide="${iconName}" class="w-5 h-5 ${iconColor} flex-shrink-0 ml-1"></i>`;
                } else {
                    iconHtml = `<i data-lucide="x-circle" class="w-5 h-5 text-rose-500 flex-shrink-0 ml-1"></i>`;
                }
                return `
                <div class="glass-card rounded-[5px] p-3 flex justify-between items-center">
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1 truncate">${title}</p>
                        <p class="font-black text-sm uppercase truncate ${status === 'Available' ? 'text-emerald-600' : 'text-rose-600'}">${ts(status)}</p>
                    </div>
                    ${iconHtml}
                </div>`;
            };

            html = `
                <div>
                    <h4 class="text-xs font-black text-slate-400 tracking-widest uppercase mb-3 px-1">${t('gen_info')}</h4>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="glass-card rounded-[5px] p-3"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('num')}</p><p class="font-black text-sm uppercase truncate">${v.number}</p></div>
                        <div class="glass-card rounded-[5px] p-3"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('type')}</p><p class="font-black text-sm uppercase truncate">${v.type}</p></div>
                        <div class="glass-card rounded-[5px] p-3"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('cap')}</p><p class="font-black text-sm uppercase truncate">${v.capacity}</p></div>
                        <div class="glass-card rounded-[5px] p-3"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('cab')}</p><p class="font-black text-sm uppercase truncate">${v.cabin || 'N/A'}</p></div>
                        <div class="glass-card rounded-[5px] p-3"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('fuel')}</p><p class="font-black text-sm uppercase truncate">${v.fuelType || 'N/A'}</p></div>
                        <div class="glass-card rounded-[5px] p-3 flex justify-between items-center"><div class="overflow-hidden"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${t('run_status')}</p><p class="font-black text-sm uppercase truncate">${ts(v.runningStatus)}</p></div></div>
                    </div>
                </div>
                
                <div class="mt-6 mb-4">
                    <h4 class="text-xs font-black text-slate-400 tracking-widest uppercase mb-3 px-1">${t('comp')}</h4>

                        ${compBox(t('permit'), v.nationalPermit, v.nationalPermitExpiry)}
                        ${compBox(t('fit'), v.fitness, v.fitnessExpiry)}
                        ${compBox(t('pol'), v.pollution, v.pollutionExpiry)}
                        ${compBox(t('ins'), v.insurance, v.insuranceExpiry)}
                    </div>
                </div>
                
                ${financeHtml}
            `;
        } else if (currentDetailData.type === 'driver') {
            const d = item;
            const sh = d.salaryHistory || [];

            let pendingOverall = 0;
            
            if (sh.length > 0) {
                const totalOverall = sh.reduce((sum, s) => sum + s.total, 0);
                const paidOverall = sh.reduce((sum, s) => sum + s.paid, 0);
                pendingOverall = Math.max(0, totalOverall - paidOverall);

                let historyHtml = '';
                sh.forEach(s => {
                    const pending = Math.max(0, s.total - s.paid);
                    const percent = s.total > 0 ? Math.min(100, (s.paid / s.total) * 100) : 0;
                    
                    const epfoBadge = (d.epfo === 'Activated' && s.epfoSettled) ? `<div class="text-[10px] font-bold mt-2 pt-2 border-t border-slate-200 dark:border-slate-700 uppercase flex items-center gap-1 text-blue-500"><i data-lucide="check-circle" class="w-3 h-3"></i> ${t('cleared')}</div>` : '';

                    historyHtml += `
                        <div class="glass-card rounded-[5px] p-4 mb-3">
                            <div class="flex justify-between items-center mb-2">
                                <h5 class="font-black text-sm uppercase">${formatMonthStr(s.month)}</h5>
                                <span class="badge ${pending === 0 ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'} uppercase">${pending === 0 ? t('cleared') : t('pending')}</span>
                            </div>
                            <div class="flex justify-between mb-1">
                                <span class="text-emerald-500 !text-[11px] font-bold uppercase"><i data-lucide="check-circle" class="w-3 h-3 inline"></i> <span class="!text-[11px]">${fmt(s.paid)}</span> ${t('paid')}</span>
                                <span class="text-amber-500 !text-[11px] font-bold uppercase"><i data-lucide="clock" class="w-3 h-3 inline"></i> <span id="info-bal-val">${fmt(pending)}</span> ${t('due')}</span>
                            </div>
                            <div class="flex justify-between mb-2">
                                <span class="text-slate-400 !text-[10px] font-bold uppercase tracking-tight">${t('total')}: ${fmt(s.total)}</span>
                                <span class="text-indigo-500 !text-[10px] font-bold uppercase tracking-tight">${t('inc')}: ${fmt(s.incentive || 0)}</span>
                            </div>
                            <div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mt-1">
                                <div class="h-full bg-emerald-500 rounded-full" style="width: ${percent}%"></div>
                            </div>
                            ${epfoBadge}
                        </div>
                    `;
                });

                monthlyRecordsSection = `

function saveDriver(isEdit) {
    const role = document.getElementById('d-role').value;

    document.querySelectorAll('.salary-row').forEach(row => {
        const m = row.querySelector('.s-month').value, t = +row.querySelector('.s-total').value || 0, p = +row.querySelector('.s-paid').value || 0, i = +row.querySelector('.s-incentive').value || 0, epfo = row.querySelector('.s-epfo') ? row.querySelector('.s-epfo').checked : false;
        if (m) salaryHistory.push({ month: m, total: t, paid: p, incentive: i, epfoSettled: epfo });
    });
    salaryHistory.sort((a,b) => b.month.localeCompare(a.month)); 
    const d = { 
        id: isEdit && currentDetailData ? currentDetailData.id : (role === 'Driver' ? 'D' : 'W') + Date.now(), name: document.getElementById('d-name').value, phone: document.getElementById('d-phone').value, email: document.getElementById('d-email').value, aadhaar: document.getElementById('d-aadhaar').value, epfo: document.getElementById('d-epfo').value, license: role === 'Driver' ? document.getElementById('d-license').value : '', salaryType: document.getElementById('d-salaryType').value, baseSalary: +document.getElementById('d-baseSalary').value || 0, salaryHistory, role 
    };
    if (!d.name) return alert('Enter name');
    if (isEdit) { const arr = db.get('drivers'), i = arr.findIndex(x => x.id === d.id); if (i > -1) { arr[i] = d; db.set('drivers', arr); } } else { db.push('drivers', d); createConfetti(); }
    activeStaffTab = role === 'Driver' ? 'drivers' : 'workers';
    switchTab('drivers', true, 'replace');
}

function initChart() {
    const ctx = document.getElementById('financeChart');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    
    const trips = db.get('trips');
    const expenses = db.get('expenses');
    
    const labels = [];
    const incomeData = [];
    const expenseData = [];
    
    for(let i=5; i>=0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        const ym = d.toISOString().slice(0,7); 
        labels.push(d.toLocaleString(curLang === 'en' ? 'en-US' : 'hi-IN', { month: 'short' }));
        
        incomeData.push(trips.filter(tr => tr.date.startsWith(ym)).reduce((s,tr)=>s+tr.freightAmount, 0));
        expenseData.push(expenses.filter(e => e.date.startsWith(ym)).reduce((s,e)=>s+e.amount, 0));
    }

    chartInstance = new Chart(ctx, { 
        type: 'bar', 
        data: { 
            labels: labels, 
            datasets: [
                { label: t('income'), data: incomeData, backgroundColor: '#4f46e5', borderRadius: 4 }, 
                { label: t('expenses_sm'), data: expenseData, backgroundColor: '#ef4444', borderRadius: 4 }
            ] 
        }, 
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: {family: 'Quantico', size: 10} } } },
            scales: { 
                x: { grid: { display: false }, ticks: { font: {family: 'Quantico', size: 10} } }, 
                y: { ticks: { font: {family: 'Quantico', size: 10} } } 
            }
        } 
    });
}

window.onload = () => { 
    translateUI();
    updateThemeIcon(); 
    updateCompanyName(localStorage.getItem('ot_company_name')); 
    setTimeout(showOnboarding, 500); 
    history.replaceState({ tab: 'dashboard', detail: null }, t('home').toUpperCase(), '#dashboard');
    switchTab('dashboard', true, 'none');

    let lastScroll = 0;
    const mainContent = document.getElementById('main-content');
    const header = document.getElementById('main-header');
    
    mainContent.addEventListener('scroll', (e) => {
        if (window.innerWidth >= 768) return;
        const st = e.target.scrollTop;
        if (st > lastScroll && st > 60) {
            header.style.marginTop = `-${header.offsetHeight}px`;
        } else if (st < lastScroll - 10 || st <= 0) {
            header.style.marginTop = '0px';
        }
        lastScroll = st;
    });
};

window.addEventListener('popstate', (e) => {
    const fab = document.getElementById('fab-menu');
    if (!fab.classList.contains('hidden')) { closeFabMenu(); history.pushState(e.state, '', location.hash); return; }
    const ob = document.getElementById('onboarding-overlay');
    if (!ob.classList.contains('hidden')) { skipOnboarding(); history.pushState(e.state, '', location.hash); return; }
    if (e.state && e.state.tab) { currentDetailData = e.state.detail || null; switchTab(e.state.tab, false, 'none'); } 
    else { switchTab('dashboard', false, 'none'); }
});
