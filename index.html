<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver GPS Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center h-screen p-6 text-center font-sans">

    <div class="bg-slate-800 p-8 rounded-2xl border-2 border-slate-700 shadow-2xl max-w-sm w-full">
        <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse" id="status-icon">
            <span class="text-2xl">📍</span>
        </div>
        <h2 class="text-2xl font-black mb-2 uppercase">Driver App</h2>
        <p class="text-slate-400 font-bold mb-6">OmniTransport Live Sync</p>
        
        <div id="status-text" class="p-4 bg-slate-900 rounded-lg text-sm font-mono text-emerald-400 break-words mb-6 border border-slate-700">
            Waiting to start...
        </div>

        <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl uppercase tracking-wider transition-colors">
            Start Sharing Location
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLSOpqIBUdvCFy8C2drX16aKzeUO9Wps4",
            authDomain: "omnicrm-0611.firebaseapp.com",
            databaseURL: "https://omnicrm-0611-default-rtdb.firebaseio.com",
            projectId: "omnicrm-0611",
            storageBucket: "omnicrm-0611.firebasestorage.app",
            messagingSenderId: "589912209026",
            appId: "1:589912209026:web:3eb29be71c19f3935f269b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const driverId = "D1"; 
        let watchId = null;
        let lastSentTime = 0; 
        const UPDATE_INTERVAL = 10000; // 10 Seconds ka delay
        let wakeLock = null; 

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.error('Wake Lock error:', err);
            }
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            if (navigator.geolocation) {
                document.getElementById('start-btn').innerText = "Tracking Active...";
                document.getElementById('start-btn').classList.replace('bg-blue-600', 'bg-emerald-600');
                
                await requestWakeLock(); // Screen off hone se roko
                
                watchId = navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy; // Error margin in meters
                    const now = Date.now();
                    
                    // RULE 1: Accuracy 100m ya usse kam (better) honi chahiye
                    if (accuracy <= 100) {
                        
                        // RULE 2: Pichli location bheje hue 10 seconds ho chuke hon
                        if (now - lastSentTime >= UPDATE_INTERVAL) {
                            
                            set(ref(db, 'tracking/' + driverId), {
                                lat: lat,
                                lng: lng,
                                timestamp: now
                            });
                            
                            lastSentTime = now; 
                            document.getElementById('status-text').innerHTML = `Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}<br><span class="text-emerald-400 font-bold">Accuracy: ${Math.round(accuracy)}m</span><br><span class="text-slate-500 text-xs">Sent to Server</span>`;
                        } else {
                            // 10 second nahi hue, sirf UI update karo
                            document.getElementById('status-text').innerHTML = `Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}<br><span class="text-amber-400 font-bold">Accuracy: ${Math.round(accuracy)}m</span><br><span class="text-slate-500 text-xs">Waiting for interval...</span>`;
                        }
                    } else {
                        // Agar accuracy 100m se zyada kharab hai, toh data mat bhejo
                        document.getElementById('status-text').innerHTML = `<span class="text-red-500 font-bold">Poor GPS (Error: ${Math.round(accuracy)}m)</span><br><span class="text-slate-500 text-xs">Searching for better satellites...</span>`;
                    }
                    
                }, (error) => {
                    document.getElementById('status-text').innerHTML = `<span class="text-red-500">Error: ${error.message}<br>Please check GPS permissions.</span>`;
                }, {
                    enableHighAccuracy: true, // Forces phone to use real GPS, not just cell towers
                    maximumAge: 0,
                    timeout: 10000
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });
    </script>
</body>
</html>
