<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniTransport | XRV LABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: { 'sans': ['Quantico', 'sans-serif'] },
                    animation: {
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } }
                    }
                }
            }
        }
        if (!localStorage.getItem('ot_theme')) localStorage.setItem('ot_theme', 'light');
        if (localStorage.getItem('ot_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quantico', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background-color: #f8fafc; }
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }
        
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 2px solid #e2e8f0; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        
        html, body, button, input, select, textarea, p, h1, h2, h3, span, div { font-size: clamp(14px, 3.5vw, 18px) !important; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .field-input { padding: clamp(10px, 2.5vw, 14px); border: 2px solid #cbd5e1; outline: none; border-radius: 5px; }
        .field-input:focus { border-color: #4f46e5; }
        .dark .field-input { border-color: #475569; background: #1e293b; }
        .dark .field-input:focus { border-color: #818cf8; }
        .btn-primary { padding: clamp(10px, 3vw, 16px); font-weight: 700; border-radius: 5px; }
        .btn-primary:active { transform: translateY(2px); }
        
        /* Compact Badge Size */
        .badge { padding: 3px 6px; font-size: 11px !important; font-weight: 700; text-transform: uppercase; white-space: nowrap; border-radius: 4px; }
        @media (min-width: 768px) {
            .badge { padding: 4px 8px; font-size: 13px !important; border-radius: 5px; }
        }

        .stat-card { padding: clamp(10px, 3vw, 20px); border: 2px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }
        
        #main-content { padding: 8px; padding-bottom: 90px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 2px solid #e2e8f0; }
        .dark #bottom-nav { border-top-color: #334155; }
        
        .desktop-only { display: none !important; }
        
        @media (min-width: 768px) {
            #main-content { padding: 8px; padding-bottom: 90px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .desktop-only { display: flex !important; }
        }
        .chart-container canvas { width: 100% !important; }

        .tab-switcher { display: flex; background: #e2e8f0; border-radius: 5px; padding: 4px; gap: 4px; }
        .dark .tab-switcher { background: #1e293b; }
        .tab-btn { flex: 1; padding: 10px 16px; border-radius: 5px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; color: #64748b; }
        .tab-btn.active { background: white; color: #4f46e5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .dark .tab-btn.active { background: #334155; color: #818cf8; }

        /* Static Skeleton */
        .skeleton-card { background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 5px; overflow: hidden; }
        .dark .skeleton-card { background: #1e293b; border-color: #334155; }
        .skeleton-bar { background: #e2e8f0; border-radius: 5px; }
        .dark .skeleton-bar { background: #334155; }

        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti { position: absolute; opacity: 0; }
        @keyframes confetti-fall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .onboarding-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .onboarding-spotlight { position: absolute; border-radius: 5px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.85); transition: all 0.5s ease; }
        .onboarding-tooltip { position: absolute; background: white; border-radius: 5px; padding: 24px; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10001; }
        .dark .onboarding-tooltip { background: #1e293b; }
        .onboarding-progress { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; transition: all 0.3s; }
        .onboarding-dot.active { background: #4f46e5; width: 24px; border-radius: 5px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>

<script>
const today = () => new Date().toISOString().split('T')[0];
const fmt = n => '₹' + parseFloat(n).toLocaleString('en-IN');
const formatMonthStr = (ym) => {
    if(!ym) return 'N/A';
    const [y, m] = ym.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m, 10)-1]} ${y}`;
};

let activeStaffTab = 'drivers';

const db = {
    get: k => JSON.parse(localStorage.getItem('ot_' + k)) || [],
    set: (k, v) => localStorage.setItem('ot_' + k, JSON.stringify(v)),
    push(k, item) { const d = this.get(k); d.push(item); this.set(k, d); },
    delete(k, id) { this.set(k, this.get(k).filter(x => x.id !== id)); }
};

let chartInstance = null, currentDetailData = null;

window.addSalaryRow = (m='', t='', p='', i='', epfoSettled=true) => {
    const container = document.getElementById('monthly-salaries-container');
    if (!container) return;
    const currentM = m || today().slice(0,7);
    const isEpfoActive = document.getElementById('d-epfo')?.value === 'Activated';
    
    container.insertAdjacentHTML('beforeend', `
        <div class="glass-card rounded-[5px] p-3 mb-3 salary-row relative animate-slide-up focus-within:border-indigo-500 dark:focus-within:border-indigo-400 transition-colors">
            <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-rose-500 w-6 h-6 flex items-center justify-center bg-rose-100 rounded-[5px] z-10"><i data-lucide="x" class="w-4 h-4"></i></button>
            <div class="grid grid-cols-2 gap-2 mt-2 items-end">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">MONTH</label><input type="month" class="w-full bg-transparent border-none outline-none font-black text-sm uppercase s-month text-slate-900 dark:text-slate-100" value="${currentM}"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">TOTAL (₹)</label><input type="number" placeholder="0" class="w-full bg-transparent border-none outline-none font-black text-sm uppercase s-total text-slate-900 dark:text-slate-100" value="${t}"></div>

function renderSkeleton(type, count) {
    let html = '';
    if (type === 'dashboard') {
        html += `<div class="grid grid-cols-2 gap-2 mb-3">${[0,1,2,3].map(i => `<div class="skeleton-card p-4 flex flex-col items-center gap-2"><div class="skeleton-bar w-10 h-10 rounded-full"></div><div class="skeleton-bar h-3 w-16 mt-1"></div></div>`).join('')}</div>`;
        html += `<div class="skeleton-bar h-5 w-32 mb-3"></div><div class="space-y-3">${[0,1,2].map(i => `<div class="skeleton-card p-4"><div class="flex justify-between"><div><div class="skeleton-bar h-6 w-40 mb-2"></div><div class="skeleton-bar h-4 w-28"></div></div><div><div class="skeleton-bar h-6 w-20 mb-2"></div><div class="skeleton-bar h-5 w-16 rounded-[5px]"></div></div></div></div>`).join('')}</div>`;
    } else if (type === 'stats') {
        html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">${[0,1,2,3].map(i => `<div class="skeleton-card p-4"><div class="skeleton-bar h-3 w-16 mb-2"></div><div class="skeleton-bar h-8 w-24"></div></div>`).join('')}</div>`;
        html += `<div class="skeleton-card p-4"><div class="skeleton-bar h-5 w-40 mx-auto mb-4"></div><div class="flex items-end justify-center gap-4 h-[200px]"><div class="skeleton-bar w-20 h-[60%]"></div><div class="skeleton-bar w-20 h-[80%]"></div></div></div>`;
    } else if (type === 'staff') {
        html += `<div class="skeleton-card p-2 mb-3"><div class="flex gap-2"><div class="skeleton-bar flex-1 h-12 rounded-[5px]"></div><div class="skeleton-bar flex-1 h-12 rounded-[5px]"></div></div></div>`;
        html += `<div class="space-y-3">${Array(count).fill(0).map(() => `<div class="skeleton-card p-4"><div class="flex justify-between"><div><div class="skeleton-bar h-6 w-3/4 mb-2"></div><div class="skeleton-bar h-4 w-1/2"></div></div><div class="skeleton-bar h-8 w-20 rounded-[5px]"></div></div></div>`).join('')}</div>`;
    } else {
        html += `<div class="space-y-3">${Array(count).fill(0).map(() => `<div class="skeleton-card p-4"><div class="flex justify-between mb-3"><div><div class="skeleton-bar h-6 w-3/4 mb-2"></div><div class="skeleton-bar h-4 w-1/2"></div></div><div class="skeleton-bar h-8 w-20 rounded-[5px]"></div></div><div class="flex justify-between pt-3 border-t-2 border-slate-100 dark:border-slate-700"><div class="skeleton-bar h-4 w-24"></div><div class="skeleton-bar h-4 w-16"></div></div></div>`).join('')}</div>`;
    }
    return html;
}

function createConfetti() {
    const c = document.getElementById('confetti-container'), colors = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
    for (let i = 0; i < 100; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation:confetti-fall ${Math.random()*2+2}s linear forwards;animation-delay:${Math.random()*0.5}s`;
        c.appendChild(el);
    }
    setTimeout(() => c.innerHTML = '', 4000);
}

const onboardingSteps = [
    { target: null, icon: 'sparkles', title: 'Welcome!', description: 'Complete fleet management solution.', position: 'center' },
    { target: '#main-header', icon: 'layout-dashboard', title: 'Header', description: 'Theme toggle and profile settings.', position: 'bottom' },
    { target: '#nav-fab', icon: 'plus-circle', title: 'Quick Actions', description: 'Add trips, expenses, vehicles, staff.', position: 'top' },
    { target: null, icon: 'home', title: 'Dashboard', description: 'Your home with recent trips.', position: 'center' },
    { target: null, icon: 'bar-chart-2', title: 'Reports', description: 'Track income and expenses.', position: 'center' }
];
let currentOnboardingStep = 0;

function showOnboarding() {
    if (localStorage.getItem('ot_onboarding_done')) return;
    document.getElementById('onboarding-overlay').classList.remove('hidden');
    updateOnboardingStep();
}

function updateOnboardingStep() {
    const s = onboardingSteps[currentOnboardingStep], tt = document.getElementById('onboarding-tooltip'), sp = document.getElementById('onboarding-spotlight');
    document.getElementById('onboarding-title').textContent = s.title;
    document.getElementById('onboarding-description').textContent = s.description;
    document.getElementById('onboarding-step').textContent = currentOnboardingStep + 1;
    document.getElementById('onboarding-total').textContent = onboardingSteps.length;
    document.getElementById('onboarding-icon').setAttribute('data-lucide', s.icon);
    document.querySelectorAll('.onboarding-dot').forEach((d, i) => d.classList.toggle('active', i === currentOnboardingStep));
    tt.querySelector('button:last-of-type').textContent = currentOnboardingStep === onboardingSteps.length - 1 ? 'Done' : 'Next';
    if (s.target) {
        const el = document.querySelector(s.target);
        if (el) { const r = el.getBoundingClientRect(); sp.style.cssText = `top:${r.top-8}px;left:${r.left-8}px;width:${r.width+16}px;height:${r.height+16}px;display:block`; tt.style.cssText = s.position === 'bottom' ? `top:${r.bottom+20}px;left:50%;transform:translateX(-50%)` : `bottom:${innerHeight-r.top+20}px;left:50%;transform:translateX(-50%)`; }
    } else { sp.style.display = 'none'; tt.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)'; }
    lucide.createIcons();
}

function nextOnboarding() { if (++currentOnboardingStep >= onboardingSteps.length) { skipOnboarding(); createConfetti(); } else updateOnboardingStep(); }
function skipOnboarding() { localStorage.setItem('ot_onboarding_done', '1'); document.getElementById('onboarding-overlay').classList.add('hidden'); }
function resetOnboarding() { localStorage.removeItem('ot_onboarding_done'); currentOnboardingStep = 0; showOnboarding(); }

function renderEmptyState(type) {
    const s = { vehicles: ['truck', 'No Vehicles', 'add-vehicle', 'amber'], drivers: ['users', 'No Staff', 'add-driver', 'blue'], trips: ['route', 'No Trips', 'add-trip', 'indigo'], expenses: ['receipt', 'No Expenses', 'add-expense', 'red'] }[type];
    if (!s) return '';
    return `<div class="empty-state"><div class="floating mb-6"><div class="w-20 h-20 bg-${s[3]}-100 dark:bg-${s[3]}-900/30 rounded-full flex items-center justify-center"><i data-lucide="${s[0]}" class="w-10 h-10 text-${s[3]}-600"></i></div></div><h3 class="font-black text-xl mb-2">${s[1]}</h3><button onclick="switchTab('${s[2]}')" class="btn-primary bg-${s[3]}-600 text-white px-6 mt-4"><i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>Add</button></div>`;
}

function editItem(t, id) { currentDetailData = { type: t, id }; switchTab('edit-' + t); }
function deleteItem(t, id) { if (confirm('Delete?')) { db.delete(t + 's', id); switchTab(t + 's'); } }

function updateCompanyName(v) { localStorage.setItem('ot_company_name', v); const el = document.getElementById('sidebar-company-name'); if (el) el.innerText = v || 'OmniTransport'; }

function switchTab(tab, loader = true) {
    document.querySelectorAll('#desktop-sidebar button').forEach(b => b.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400'));
    document.getElementById('side-' + tab)?.classList.add('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400');
    let title = tab.replace('-', ' ').toUpperCase();
    if (tab === 'dashboard') title = 'HOME';
    if (tab === 'drivers') title = 'STAFF';
    if (tab === 'details' && currentDetailData) title = currentDetailData.type.toUpperCase() + ' INFO';
    document.getElementById('app-title').innerText = title;
    
    if (loader && ['dashboard', 'vehicles', 'drivers', 'trips', 'expenses', 'reports'].includes(tab)) {
        const type = tab === 'dashboard' ? 'dashboard' : tab === 'reports' ? 'stats' : tab === 'drivers' ? 'staff' : 'list';
        const count = Math.min(db.get(tab).length || 3, 4);
        
        document.getElementById('main-content').innerHTML = `<div class="w-full">${renderSkeleton(type, count)}</div>`;
        
        setTimeout(() => {
            document.getElementById('main-content').innerHTML = `<div class="w-full">${renderPage(tab)}</div>`;
            lucide.createIcons(); 
            if (tab === 'reports') setTimeout(initChart, 50);
        }, 1000);
    } else {
        document.getElementById('main-content').innerHTML = `<div class="w-full">${renderPage(tab)}</div>`;
        lucide.createIcons();
        if (tab === 'reports') setTimeout(initChart, 50);
    }
    updateThemeIcon();
}

function switchStaffTab(t) { activeStaffTab = t; document.getElementById('staff-content').innerHTML = renderStaffContent(); document.querySelectorAll('.staff-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t)); lucide.createIcons(); }
function showFabMenu() { document.getElementById('fab-menu').classList.remove('hidden'); }
function closeFabMenu() { document.getElementById('fab-menu').classList.add('hidden'); }
function toggleTheme() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('ot_theme', d ? 'dark' : 'light'); updateThemeIcon(); }
function updateThemeIcon() { const i = document.getElementById('theme-icon'); if (i) { i.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon'); lucide.createIcons(); } }
function exportData() { const d = { vehicles: db.get('vehicles'), drivers: db.get('drivers'), trips: db.get('trips'), expenses: db.get('expenses'), companyName: localStorage.getItem('ot_company_name') }; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], { type: 'application/json' })); a.download = `OmniTransport_${today()}.json`; a.click(); }
function importData(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); ['vehicles', 'drivers', 'trips', 'expenses'].forEach(k => d[k] && db.set(k, d[k])); if (d.companyName) localStorage.setItem('ot_company_name', d.companyName); createConfetti(); location.reload(); } catch { alert('Invalid file'); } }; r.readAsText(f); }
function viewDetails(t, id) { currentDetailData = { type: t, id }; switchTab('details', false); }
function completeTrip(id) { const arr = db.get('trips'), t = arr.find(x => x.id === id); if (t) { t.status = 'Completed'; db.set('trips', arr); createConfetti(); switchTab('trips'); } }

function renderListCard(type, id, content) {
    return `<div class="glass-card p-4 rounded-[5px] border-2 border-slate-200 dark:border-slate-700 cursor-pointer" onclick="viewDetails('${type}','${id}')">${content}</div>`;
}

function renderStaffCard(p, all) {
    const isD = p.role === 'Driver';
    return `${renderListCard('driver', p.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-lg">${p.name}</h4><p class="font-bold text-indigo-600"><i data-lucide="phone" class="inline w-3 h-3"></i> ${p.phone}</p></div><span class="badge ${isD ? 'bg-emerald-100 text-emerald-600' : 'bg-purple-100 text-purple-600'}">${p.salaryType}</span></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${isD ? 'Lic: ' + (p.license || 'N/A') : 'Office'}</span><span class="text-xs font-bold text-slate-400">${fmt(p.baseSalary)}</span></div>`)}`;
}

function renderStaffContent() {
    const all = db.get('drivers'), list = all.filter(d => d.role === (activeStaffTab === 'drivers' ? 'Driver' : 'Worker'));
    if (!list.length) return `<div class="text-center py-12"><div class="w-16 h-16 mx-auto bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4"><i data-lucide="${activeStaffTab === 'drivers' ? 'car' : 'briefcase'}" class="w-8 h-8 text-slate-400"></i></div><p class="text-slate-500 font-bold">No ${activeStaffTab} yet</p></div>`;
    return `<div class="space-y-3">${list.map((p) => renderStaffCard(p, all)).join('')}</div>`;
}

function renderPage(tab) {
    const vehicles = db.get('vehicles'), drivers = db.get('drivers'), trips = db.get('trips'), expenses = db.get('expenses');
    
    if (tab === 'dashboard') {
        const btns = [['vehicles', 'truck', 'indigo', 'VEHICLES'], ['drivers', 'users', 'blue', 'STAFF'], ['trips', 'route', 'emerald', 'TRIPS'], ['expenses', 'banknote', 'red', 'EXPENSES']];
        if (!trips.length && !vehicles.length) return `<div class="grid grid-cols-2 gap-2 mb-3">${btns.map(([t, i, c, l]) => `<button onclick="switchTab('${t}')" class="glass-card p-4 rounded-[5px] flex flex-col items-center gap-2 border-2 border-${c}-100 dark:border-${c}-900/50"><div class="w-10 h-10 bg-${c}-100 dark:bg-${c}-900/50 text-${c}-600 rounded-[5px] flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest">${l}</span></button>`).join('')}</div>${renderEmptyState('trips')}`;
        return `<div class="grid grid-cols-2 gap-2 mb-3">${btns.map(([t, i, c, l]) => `<button onclick="switchTab('${t}')" class="glass-card p-4 rounded-[5px] flex flex-col items-center gap-2 border-2 border-${c}-100 dark:border-${c}-900/50"><div class="w-10 h-10 bg-${c}-100 dark:bg-${c}-900/50 text-${c}-600 rounded-[5px] flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest">${l}</span></button>`).join('')}</div><h3 class="font-black text-slate-400 mb-3">RECENT TRIPS</h3><div class="space-y-3">${trips.slice(-3).reverse().map((t) => `${renderListCard('trip', t.id, `<div class="flex justify-between items-center"><div><p class="font-bold text-lg">${t.origin} <i data-lucide="arrow-right" class="inline w-4 h-4"></i> ${t.dest}</p><p class="font-bold text-indigo-600 mt-1">${vehicles.find(v => v.id === t.vehicleId)?.number || 'N/A'}</p></div><div class="text-right"><p class="font-black text-indigo-600">${fmt(t.freightAmount)}</p><span class="badge ${t.status === 'Completed' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'} mt-1 inline-block">${t.status}</span></div></div>`)}`).join('')}</div>`;
    }

    if (tab === 'reports') {
        const tF = trips.reduce((s, t) => s + t.freightAmount, 0), tE = expenses.reduce((s, e) => s + e.amount, 0);
        return `<div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3"><div class="stat-card bg-indigo-600 text-white rounded-[5px] border-none"><p class="font-bold opacity-80 text-[10px]">Freight</p><h3 class="font-black text-xl">${fmt(tF)}</h3></div><div class="stat-card bg-red-50 dark:bg-red-900/20 text-red-600"><p class="font-bold text-[10px]">Expenses</p><h3 class="font-black text-xl">${fmt(tE)}</h3></div><div class="stat-card bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600"><p class="font-bold text-[10px]">Net</p><h3 class="font-black text-xl">${fmt(tF - tE)}</h3></div><div class="stat-card bg-amber-50 dark:bg-amber-900/20 text-amber-600"><p class="font-bold text-[10px]">Active</p><h3 class="font-black text-xl">${trips.filter(t => t.status === 'Ongoing').length}</h3></div></div><div class="glass-card p-4 rounded-[5px] border-2 border-slate-200 dark:border-slate-700"><h3 class="font-black text-slate-400 mb-4 text-center">INCOME VS EXPENSE</h3><div class="chart-container" style="height:220px"><canvas id="financeChart"></canvas></div></div>`;
    }

    if (tab === 'vehicles') {
        if (!vehicles.length) return renderEmptyState('vehicles');
        return `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-vehicle')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">+ Add</button></div><div class="space-y-3">${vehicles.map((v) => {
            const rs = v.runningStatus || 'STOPPED';
            const badgeColor = rs === 'On Trip' ? 'bg-emerald-100 text-emerald-600' : (rs === 'Stopped' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600');
            return `${renderListCard('vehicle', v.id, `<div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-lg tracking-wider">${v.number}</h4><p class="font-bold text-indigo-600">${v.type}</p></div><span class="badge ${badgeColor} uppercase">${rs}</span></div><div class="flex justify-between items-center mt-3 pt-3 border-t-2 border-slate-100 dark:border-slate-700"><span class="font-bold text-slate-500">${v.capacity} <span class="text-slate-300 mx-1">•</span> <i data-lucide="users" class="w-3 h-3 inline"></i> ${v.cabin || 'N/A'}</span></div>`)}`;
        }).join('')}</div>`;
    }

    if (tab === 'drivers') {
        if (!drivers.length) return renderEmptyState('drivers');
        return `<div class="desktop-only justify-end mb-2"><button onclick="switchTab('add-driver')" class="btn-primary bg-indigo-600 text-white py-2 px-4 text-sm">+ Add</button></div><div class="tab-switcher mb-3"><button class="tab-btn staff-tab-btn ${activeStaffTab === 'drivers' ? 'active' : ''}" data-tab="drivers" onclick="switchStaffTab('drivers')"><i data-lucide="car" class="w-4 h-4"></i>Drivers</button><button class="tab-btn staff-tab-btn ${activeStaffTab === 'workers' ? 'active' : ''}" data-tab="workers" onclick="switchStaffTab('workers')"><i data-lucide="briefcase" class="w-4 h-4"></i>Workers</button></div><div id="staff-content">${renderStaffContent()}</div>`;

        let html = '';
        
        if (currentDetailData.type === 'vehicle') {
            const v = item;
            
            let financeHtml = '';

                const total = v.totalEmis || 1;
                const paid = v.paidEmis || 0;

                const percent = Math.min(100, (paid / total) * 100);

                        <h4 class="text-xs font-black text-slate-400 tracking-widest uppercase mb-3 px-1">FINANCE</h4>

                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">EMI AMOUNT</p>
                                <p class="font-black text-lg text-indigo-600 uppercase">${fmt(v.emiAmount)}<span class="text-xs text-slate-400">/MO</span></p>

                            </div>
                            
                            <p class="text-center text-[10px] font-bold text-slate-400 mt-2 uppercase">${total} TOTAL EMIS</p>

                    ${iconHtml}
                </div>`;

            html = `

function saveVehicle(isEdit) {
    const v = { 
        id: isEdit && currentDetailData ? currentDetailData.id : 'V' + Date.now(), 
        number: document.getElementById('v-number').value.toUpperCase(), 
        type: document.getElementById('v-type').value, 
        capacity: document.getElementById('v-capacity').value, 
        cabin: document.getElementById('v-cabin').value, 
        fuelType: document.getElementById('v-fuelType').value, 
        runningStatus: document.getElementById('v-runningStatus').value, 
        
        nationalPermit: document.getElementById('v-permit').value, 
        nationalPermitIssue: document.getElementById('v-permit-issue')?.value || '',
        nationalPermitExpiry: document.getElementById('v-permit-expiry')?.value || '',
        
        fitness: document.getElementById('v-fitness').value, 
        fitnessIssue: document.getElementById('v-fitness-issue')?.value || '',
        fitnessExpiry: document.getElementById('v-fitness-expiry')?.value || '',
        
        pollution: document.getElementById('v-pollution').value, 
        pollutionIssue: document.getElementById('v-pollution-issue')?.value || '',
        pollutionExpiry: document.getElementById('v-pollution-expiry')?.value || '',
        
        insurance: document.getElementById('v-insurance').value, 
        insuranceIssue: document.getElementById('v-insurance-issue')?.value || '',
        insuranceExpiry: document.getElementById('v-insurance-expiry')?.value || '',
        
        hasFinance: document.getElementById('v-hasFinance').value, 
        emiAmount: +document.getElementById('v-emiAmount').value || 0,
        totalEmis: +document.getElementById('v-totalEmis').value || 0,
        paidEmis: +document.getElementById('v-paidEmis').value || 0,
        status: isEdit && currentDetailData ? (db.get('vehicles').find(x => x.id === currentDetailData.id)?.status || 'Active') : 'Active'
    };
    if (!v.number) return alert('Enter number');
    if (isEdit) { const arr = db.get('vehicles'), i = arr.findIndex(x => x.id === v.id); if (i > -1) { arr[i] = v; db.set('vehicles', arr); } } else { db.push('vehicles', v); createConfetti(); }
    switchTab('vehicles');
}

function saveDriver(isEdit) {
    const role = document.getElementById('d-role').value;
    
    const salaryHistory = [];
    document.querySelectorAll('.salary-row').forEach(row => {
        const m = row.querySelector('.s-month').value;
        const t = +row.querySelector('.s-total').value || 0;
        const p = +row.querySelector('.s-paid').value || 0;
        const i = +row.querySelector('.s-incentive').value || 0;
        const epfo = row.querySelector('.s-epfo') ? row.querySelector('.s-epfo').checked : false;

        if (m) salaryHistory.push({ month: m, total: t, paid: p, incentive: i, epfoSettled: epfo });
    });
    salaryHistory.sort((a,b) => b.month.localeCompare(a.month)); // Newest month first

    const d = { 
        id: isEdit && currentDetailData ? currentDetailData.id : (role === 'Driver' ? 'D' : 'W') + Date.now(), 
        name: document.getElementById('d-name').value, 
        phone: document.getElementById('d-phone').value, 
        email: document.getElementById('d-email').value,
        aadhaar: document.getElementById('d-aadhaar').value,
        epfo: document.getElementById('d-epfo').value,
        license: role === 'Driver' ? document.getElementById('d-license').value : '', 
        salaryType: document.getElementById('d-salaryType').value, 
        baseSalary: +document.getElementById('d-baseSalary').value || 0, 
        salaryHistory,
        role 
    };
    
    if (!d.name) return alert('Enter name');
    if (isEdit) { const arr = db.get('drivers'), i = arr.findIndex(x => x.id === d.id); if (i > -1) { arr[i] = d; db.set('drivers', arr); } } else { db.push('drivers', d); createConfetti(); }
    activeStaffTab = role === 'Driver' ? 'drivers' : 'workers';
    switchTab('drivers');
}

    if (!t.origin || !t.dest) return alert('Enter origin & destination');
    if (isEdit) { const arr = db.get('trips'), i = arr.findIndex(x => x.id === t.id); if (i > -1) { arr[i] = t; db.set('trips', arr); } } else { db.push('trips', t); createConfetti(); }
    switchTab('trips');
}

function saveExpense(isEdit) {
    const e = { id: isEdit && currentDetailData ? currentDetailData.id : 'E' + Date.now(), type: document.getElementById('e-type').value, amount: +document.getElementById('e-amount').value || 0, vehicleId: document.getElementById('e-vehicle')?.value || '', driverId: document.getElementById('e-driver')?.value || '', date: document.getElementById('e-date').value, notes: document.getElementById('e-notes').value };

function initChart() {
    const ctx = document.getElementById('financeChart');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    const trips = db.get('trips'), expenses = db.get('expenses');
    chartInstance = new Chart(ctx, { type: 'bar', data: { labels: ['Total'], datasets: [{ label: 'Income', data: [trips.reduce((s, t) => s + t.freightAmount, 0)], backgroundColor: '#4f46e5', borderRadius: 5 }, { label: 'Expense', data: [expenses.reduce((s, e) => s + e.amount, 0)], backgroundColor: '#ef4444', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
}

window.onload = () => { updateThemeIcon(); updateCompanyName(localStorage.getItem('ot_company_name')); setTimeout(showOnboarding, 500); };
switchTab('dashboard');
</script>
</body>
</html>
