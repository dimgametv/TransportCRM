<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniTransport | XRV LABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: { 'sans': ['Quantico', 'sans-serif'] },
                    animation: {
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
                        fadeIn: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                    }
                }
            }
        }
        if (!localStorage.getItem('ot_theme')) localStorage.setItem('ot_theme', 'light');
        if (localStorage.getItem('ot_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quantico', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background-color: #f8fafc; }
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }
        
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 2px solid #e2e8f0; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        
        html, body, button, input, select, textarea, p, h1, h2, h3, span, div, .badge { font-size: clamp(14px, 3.5vw, 18px) !important; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .field-input { padding: clamp(10px, 2.5vw, 14px); border: 2px solid #cbd5e1; outline: none; border-radius: 5px; }
        .field-input:focus { border-color: #4f46e5; }
        .dark .field-input { border-color: #475569; background: #1e293b; }
        .dark .field-input:focus { border-color: #818cf8; }
        .btn-primary { padding: clamp(10px, 3vw, 16px); font-weight: 700; border-radius: 5px; }
        .btn-primary:active { transform: translateY(2px); }
        
        .badge { padding: 4px 8px; font-weight: 700; text-transform: uppercase; white-space: nowrap; border-radius: 5px; }
        .stat-card { padding: clamp(10px, 3vw, 20px); border: 2px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }
        
        #main-content { padding: 8px; padding-bottom: 90px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 2px solid #e2e8f0; }
        .dark #bottom-nav { border-top-color: #334155; }
        
        .desktop-only { display: none !important; }
        
        @media (min-width: 768px) {
            #main-content { padding: 8px; padding-bottom: 90px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .desktop-only { display: flex !important; }
        }
        .chart-container canvas { width: 100% !important; }

        .tab-switcher { display: flex; background: #e2e8f0; border-radius: 5px; padding: 4px; gap: 4px; }
        .dark .tab-switcher { background: #1e293b; }
        .tab-btn { flex: 1; padding: 10px 16px; border-radius: 5px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; color: #64748b; }
        .tab-btn.active { background: white; color: #4f46e5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .dark .tab-btn.active { background: #334155; color: #818cf8; }

        .skeleton-card { position: relative; overflow: hidden; background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 5px; }
        .dark .skeleton-card { background: #1e293b; border-color: #334155; }
        .skeleton-card::before { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, transparent 0%, rgba(79, 70, 229, 0.15) 20%, rgba(79, 70, 229, 0.3) 50%, rgba(79, 70, 229, 0.15) 80%, transparent 100%); animation: stepFill var(--fill-duration, 0.5s) ease-out forwards; animation-delay: var(--fill-delay, 0s); z-index: 1; }
        .dark .skeleton-card::before { background: linear-gradient(90deg, transparent 0%, rgba(129, 140, 248, 0.2) 20%, rgba(129, 140, 248, 0.4) 50%, rgba(129, 140, 248, 0.2) 80%, transparent 100%); }
        .skeleton-card::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(79, 70, 229, 0.08); animation: stepFillBg var(--fill-duration, 0.5s) ease-out forwards; animation-delay: var(--fill-delay, 0s); }
        .dark .skeleton-card::after { background: rgba(129, 140, 248, 0.1); }
        @keyframes stepFill { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes stepFillBg { 0% { width: 0%; } 100% { width: 100%; } }
        .skeleton-bar { background: #e2e8f0; border-radius: 5px; }
        .dark .skeleton-bar { background: #334155; }
        .loading-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5); background-size: 200% 100%; animation: progressShimmer 1s linear infinite, progressGrow var(--total-duration, 1.5s) ease-out forwards; z-index: 9999; }
        @keyframes progressShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes progressGrow { 0% { width: 0%; } 100% { width: 100%; } }

        .swipe-container { position: relative; overflow: hidden; touch-action: pan-y; }
        .swipe-content { position: relative; z-index: 10; transition: transform 0.3s ease; }
        .swipe-actions { position: absolute; top: 0; bottom: 0; display: flex; align-items: stretch; }
        .swipe-actions-left { left: 0; transform: translateX(-100%); }
        .swipe-actions-right { right: 0; transform: translateX(100%); }
        .swipe-btn { display: flex; align-items: center; justify-content: center; width: 70px; font-weight: bold; color: white; }

        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti { position: absolute; opacity: 0; }
        @keyframes confetti-fall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .onboarding-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .onboarding-spotlight { position: absolute; border-radius: 5px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.85); transition: all 0.5s ease; }
        .onboarding-tooltip { position: absolute; background: white; border-radius: 5px; padding: 24px; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10001; }
        .dark .onboarding-tooltip { background: #1e293b; }
        .onboarding-progress { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; transition: all 0.3s; }
        .onboarding-dot.active { background: #4f46e5; width: 24px; border-radius: 5px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .card-reveal { opacity: 0; transform: translateY(20px); animation: cardReveal 0.4s ease-out forwards; }
        @keyframes cardReveal { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100">
<div id="app" class="app-container">
    <section id="view-main" class="flex-1 flex flex-col overflow-hidden w-full">
        <aside id="desktop-sidebar" class="hidden w-64 bg-white dark:bg-slate-900 border-r-2 border-slate-200 dark:border-slate-800 flex-col flex-shrink-0">
            <div class="p-6 border-b-2 border-slate-100 dark:border-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-[5px] flex items-center justify-center text-white"><i data-lucide="truck" class="w-6 h-6"></i></div>

            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('dashboard')" id="side-dashboard" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="home"></i> Dashboard</button>
                <button onclick="switchTab('trips')" id="side-trips" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="route"></i> Trips</button>
                <button onclick="switchTab('vehicles')" id="side-vehicles" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="truck"></i> Vehicles</button>
                <button onclick="switchTab('drivers')" id="side-drivers" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="users"></i> Staff</button>
                <div class="my-2 border-t-2 border-slate-100 dark:border-slate-800"></div>
                <button onclick="switchTab('payments')" id="side-payments" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="indian-rupee"></i> Payments</button>
                <button onclick="switchTab('expenses')" id="side-expenses" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="banknote"></i> Expense</button>
                <button onclick="switchTab('reports')" id="side-reports" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="bar-chart-2"></i> Reports</button>
            </nav>
            <div class="p-4 border-t-2 border-slate-100 dark:border-slate-800">
                <button onclick="switchTab('profile')" id="side-profile" class="w-full flex items-center gap-3 p-3 rounded-[5px] font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="settings"></i> Settings</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden w-full">
            <header id="main-header" class="flex items-center justify-between bg-white dark:bg-slate-900 border-b-2 border-slate-200 dark:border-slate-800 p-4 z-10">
                <h2 id="app-title" class="font-black text-xl tracking-wide text-indigo-600 dark:text-indigo-400">HOME</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-[5px] border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500"><i id="theme-icon" data-lucide="sun"></i></button>
                    <button onclick="switchTab('profile')" class="w-10 h-10 rounded-[5px] border-2 border-slate-200 dark:border-slate-700 overflow-hidden bg-slate-100 dark:bg-slate-800"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-full h-full"></button>
                </div>
            </header>
            <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar relative w-full"></main>
        </div>

        <nav id="bottom-nav" class="flex justify-around items-center bg-white dark:bg-slate-900 z-50 md:hidden w-full py-2">
            <button onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="home" class="w-6 h-6"></i><span class="text-xs font-bold">Home</span></button>
            <button onclick="showFabMenu()" id="nav-fab" class="flex flex-col items-center -mt-6 relative z-10"><div class="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white dark:border-slate-900"><i data-lucide="plus" class="w-7 h-7"></i></div></button>
            <button onclick="switchTab('reports')" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-xs font-bold">Reports</span></button>
        </nav>
    </section>
</div>

<div id="confetti-container" class="confetti-container"></div>

<div id="onboarding-overlay" class="onboarding-overlay hidden">
    <div id="onboarding-spotlight" class="onboarding-spotlight"></div>
    <div id="onboarding-tooltip" class="onboarding-tooltip">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-12 h-12 bg-indigo-100 dark:bg-indigo-900 rounded-[5px] flex items-center justify-center"><i id="onboarding-icon" data-lucide="sparkles" class="w-6 h-6 text-indigo-600 dark:text-indigo-400"></i></div>
            <div><h3 id="onboarding-title" class="font-black text-lg">Welcome!</h3><p class="text-xs text-slate-500">Step <span id="onboarding-step">1</span> of <span id="onboarding-total">5</span></p></div>
        </div>

        <div class="flex gap-3">
            <button onclick="skipOnboarding()" class="flex-1 py-3 px-4 bg-slate-100 dark:bg-slate-800 text-slate-600 rounded-[5px] font-bold">Skip</button>
            <button onclick="nextOnboarding()" class="flex-1 py-3 px-4 bg-indigo-600 text-white rounded-[5px] font-bold">Next</button>
        </div>
        <div class="onboarding-progress"><div class="onboarding-dot active"></div><div class="onboarding-dot"></div><div class="onboarding-dot"></div><div class="onboarding-dot"></div><div class="onboarding-dot"></div></div>

</div>

<div id="fab-menu" class="hidden fixed inset-0 z-[200]">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeFabMenu()"></div>
    <div class="absolute bottom-0 left-0 right-0 glass-card rounded-t-[5px] p-6 animate-slide-up flex flex-col gap-4 z-10" style="padding-bottom: calc(var(--safe-bottom) + 24px);">
        <h3 class="font-black text-slate-800 dark:text-white uppercase text-center mb-2">Create Record</h3>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="switchTab('add-trip'); closeFabMenu();" class="p-3 bg-white dark:bg-slate-800 border-2 border-indigo-100 dark:border-indigo-900 rounded-[5px] flex flex-col items-center gap-2"><div class="w-10 h-10 bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400 rounded-[5px] flex items-center justify-center"><i data-lucide="map-pin"></i></div><span class="font-bold text-sm">Trip</span></button>
            <button onclick="switchTab('add-expense'); closeFabMenu();" class="p-3 bg-white dark:bg-slate-800 border-2 border-red-100 dark:border-red-900 rounded-[5px] flex flex-col items-center gap-2"><div class="w-10 h-10 bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-400 rounded-[5px] flex items-center justify-center"><i data-lucide="receipt"></i></div><span class="font-bold text-sm">Expense</span></button>
            <button onclick="switchTab('add-vehicle'); closeFabMenu();" class="p-3 bg-white dark:bg-slate-800 border-2 border-amber-100 dark:border-amber-900 rounded-[5px] flex flex-col items-center gap-2"><div class="w-10 h-10 bg-amber-100 dark:bg-amber-900 text-amber-600 dark:text-amber-400 rounded-[5px] flex items-center justify-center"><i data-lucide="truck"></i></div><span class="font-bold text-sm">Vehicle</span></button>
            <button onclick="switchTab('add-driver'); closeFabMenu();" class="p-3 bg-white dark:bg-slate-800 border-2 border-blue-100 dark:border-blue-900 rounded-[5px] flex flex-col items-center gap-2"><div class="w-10 h-10 bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400 rounded-[5px] flex items-center justify-center"><i data-lucide="user-plus"></i></div><span class="font-bold text-sm">Staff</span></button>
        </div>
    </div>
</div>

<script>
const today = () => new Date().toISOString().split('T')[0];
const fmt = n => '₹' + parseFloat(n).toLocaleString('en-IN');
let activeStaffTab = 'drivers';

function seedDB() {
    if (localStorage.getItem('ot_seeded_v5')) return;
    ['ot_seeded', 'ot_seeded_v2', 'ot_seeded_v3', 'ot_seeded_v4'].forEach(k => localStorage.removeItem(k));
    const data = {
        vehicles: [
            { id: 'V1', number: 'RJ-14-GD-1234', type: '10-Wheeler', capacity: '15 Ton', status: 'Active' },
            { id: 'V2', number: 'RJ-14-GD-5678', type: '14-Wheeler', capacity: '25 Ton', status: 'Active' }
        ],
        drivers: [
            { id: 'D1', name: 'Ramesh Singh', phone: '9876543210', license: 'RJ142010123', salaryType: 'Fixed', baseSalary: 15000, role: 'Driver' },
            { id: 'D2', name: 'Suresh Kumar', phone: '9876543211', license: 'RJ142010124', salaryType: 'Per Trip', baseSalary: 12000, role: 'Driver' },
            { id: 'D3', name: 'Mahesh Yadav', phone: '9876543214', license: 'RJ142010125', salaryType: 'Fixed', baseSalary: 14000, role: 'Driver' },
            { id: 'W1', name: 'Priya Sharma', phone: '9876543212', license: '', salaryType: 'Fixed', baseSalary: 18000, role: 'Worker' },
            { id: 'W2', name: 'Amit Verma', phone: '9876543213', license: '', salaryType: 'Fixed', baseSalary: 20000, role: 'Worker' },
            { id: 'W3', name: 'Neha Gupta', phone: '9876543215', license: '', salaryType: 'Fixed', baseSalary: 22000, role: 'Worker' }
        ],
        trips: [
            { id: 'T1', vehicleId: 'V1', driverId: 'D1', origin: 'Jaipur', dest: 'Delhi', freightAmount: 25000, advance: 5000, date: today(), status: 'Completed' },
            { id: 'T2', vehicleId: 'V1', driverId: 'D1', origin: 'Delhi', dest: 'Mumbai', freightAmount: 45000, advance: 10000, date: today(), status: 'Ongoing' },
            { id: 'T3', vehicleId: 'V2', driverId: 'D2', origin: 'Mumbai', dest: 'Bangalore', freightAmount: 35000, advance: 8000, date: today(), status: 'Ongoing' }
        ],
        expenses: [
            { id: 'E1', type: 'Fuel', amount: 8000, vehicleId: 'V1', date: today(), notes: 'Pump' },
            { id: 'E2', type: 'Maintenance', amount: 5000, vehicleId: 'V2', date: today(), notes: 'Tyre' }
        ]
    };
    Object.keys(data).forEach(k => localStorage.setItem('ot_' + k, JSON.stringify(data[k])));
    localStorage.setItem('ot_company_name', 'OmniTransport');
    localStorage.setItem('ot_seeded_v5', '1');
}
seedDB();

const db = {
    get: k => JSON.parse(localStorage.getItem('ot_' + k)) || [],
    set: (k, v) => localStorage.setItem('ot_' + k, JSON.stringify(v)),
    push(k, item) { const d = this.get(k); d.push(item); this.set(k, d); },
    delete(k, id) { this.set(k, this.get(k).filter(x => x.id !== id)); }
};

let chartInstance = null, currentDetailData = null;
const FILL_DURATION = 300;

function renderSkeleton(type, count) {
    let html = `<div class="loading-progress" style="--total-duration:${count * FILL_DURATION}ms"></div>`;
    if (type === 'dashboard') {
        html += `<div class="grid grid-cols-2 gap-2 mb-3">${[0,1,2,3].map(i => `<div class="skeleton-card p-4 flex flex-col items-center gap-2" style="--fill-duration:${FILL_DURATION/4}ms;--fill-delay:${i*FILL_DURATION/4}ms"><div class="skeleton-bar w-10 h-10 rounded-full"></div><div class="skeleton-bar h-3 w-16 mt-1"></div></div>`).join('')}</div>`;
        html += `<div class="skeleton-bar h-5 w-32 mb-3"></div><div class="space-y-3">${[0,1,2].map(i => `<div class="skeleton-card p-4" style="--fill-duration:${FILL_DURATION}ms;--fill-delay:${FILL_DURATION+i*FILL_DURATION}ms"><div class="flex justify-between"><div><div class="skeleton-bar h-6 w-40 mb-2"></div><div class="skeleton-bar h-4 w-28"></div></div><div><div class="skeleton-bar h-6 w-20 mb-2"></div><div class="skeleton-bar h-5 w-16 rounded-[5px]"></div></div></div></div>`).join('')}</div>`;
    } else if (type === 'stats') {
        html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">${[0,1,2,3].map(i => `<div class="skeleton-card p-4" style="--fill-duration:${FILL_DURATION/2}ms;--fill-delay:${i*FILL_DURATION/2}ms"><div class="skeleton-bar h-3 w-16 mb-2"></div><div class="skeleton-bar h-8 w-24"></div></div>`).join('')}</div>`;
        html += `<div class="skeleton-card p-4" style="--fill-duration:${FILL_DURATION}ms;--fill-delay:${2*FILL_DURATION}ms"><div class="skeleton-bar h-5 w-40 mx-auto mb-4"></div><div class="flex items-end justify-center gap-4 h-[200px]"><div class="skeleton-bar w-20 h-[60%]"></div><div class="skeleton-bar w-20 h-[80%]"></div></div></div>`;
    } else if (type === 'staff') {
        html += `<div class="skeleton-card p-2 mb-3" style="--fill-duration:${FILL_DURATION/2}ms"><div class="flex gap-2"><div class="skeleton-bar flex-1 h-12 rounded-[5px]"></div><div class="skeleton-bar flex-1 h-12 rounded-[5px]"></div></div></div>`;
        html += `<div class="space-y-3">${Array(count).fill(0).map((_, i) => `<div class="skeleton-card p-4" style="--fill-duration:${FILL_DURATION}ms;--fill-delay:${150+i*FILL_DURATION}ms"><div class="flex justify-between"><div><div class="skeleton-bar h-6 w-3/4 mb-2"></div><div class="skeleton-bar h-4 w-1/2"></div></div><div class="skeleton-bar h-8 w-20 rounded-[5px]"></div></div></div>`).join('')}</div>`;
    } else {
        html += `<div class="space-y-3">${Array(count).fill(0).map((_, i) => `<div class="skeleton-card p-4" style="--fill-duration:${FILL_DURATION}ms;--fill-delay:${i*FILL_DURATION}ms"><div class="flex justify-between mb-3"><div><div class="skeleton-bar h-6 w-3/4 mb-2"></div><div class="skeleton-bar h-4 w-1/2"></div></div><div class="skeleton-bar h-8 w-20 rounded-[5px]"></div></div><div class="flex justify-between pt-3 border-t-2 border-slate-100 dark:border-slate-700"><div class="skeleton-bar h-4 w-24"></div><div class="skeleton-bar h-4 w-16"></div></div></div>`).join('')}</div>`;
    }
    return html;
}

function getLoadDuration(type, count) {
    return type === 'dashboard' ? FILL_DURATION * 4 : type === 'stats' ? FILL_DURATION * 3 : type === 'staff' ? 150 + count * FILL_DURATION : count * FILL_DURATION;
}

function createConfetti() {
    const c = document.getElementById('confetti-container'), colors = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
    for (let i = 0; i < 100; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation:confetti-fall ${Math.random()*2+2}s linear forwards;animation-delay:${Math.random()*0.5}s`;
        c.appendChild(el);
    }
    setTimeout(() => c.innerHTML = '', 4000);
}

const onboardingSteps = [
    { target: null, icon: 'sparkles', title: 'Welcome!', description: 'Complete fleet management solution.', position: 'center' },
    { target: '#main-header', icon: 'layout-dashboard', title: 'Header', description: 'Theme toggle and profile settings.', position: 'bottom' },
    { target: '#nav-fab', icon: 'plus-circle', title: 'Quick Actions', description: 'Add trips, expenses, vehicles, staff.', position: 'top' },
    { target: null, icon: 'home', title: 'Dashboard', description: 'Your home with recent trips.', position: 'center' },
    { target: null, icon: 'bar-chart-2', title: 'Reports', description: 'Track income and expenses.', position: 'center' }
];
let currentOnboardingStep = 0;

function showOnboarding() {
    if (localStorage.getItem('ot_onboarding_done')) return;
    document.getElementById('onboarding-overlay').classList.remove('hidden');
    updateOnboardingStep();
}

function updateOnboardingStep() {
    const s = onboardingSteps[currentOnboardingStep], tt = document.getElementById('onboarding-tooltip'), sp = document.getElementById('onboarding-spotlight');
    document.getElementById('onboarding-title').textContent = s.title;
    document.getElementById('onboarding-description').textContent = s.description;
    document.getElementById('onboarding-step').textContent = currentOnboardingStep + 1;
    document.getElementById('onboarding-total').textContent = onboardingSteps.length;
    document.getElementById('onboarding-icon').setAttribute('data-lucide', s.icon);
    document.querySelectorAll('.onboarding-dot').forEach((d, i) => d.classList.toggle('active', i === currentOnboardingStep));
    tt.querySelector('button:last-of-type').textContent = currentOnboardingStep === onboardingSteps.length - 1 ? 'Done' : 'Next';
    if (s.target) {
        const el = document.querySelector(s.target);
        if (el) { const r = el.getBoundingClientRect(); sp.style.cssText = `top:${r.top-8}px;left:${r.left-8}px;width:${r.width+16}px;height:${r.height+16}px;display:block`; tt.style.cssText = s.position === 'bottom' ? `top:${r.bottom+20}px;left:50%;transform:translateX(-50%)` : `bottom:${innerHeight-r.top+20}px;left:50%;transform:translateX(-50%)`; }
    } else { sp.style.display = 'none'; tt.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)'; }
    lucide.createIcons();
}

function nextOnboarding() { if (++currentOnboardingStep >= onboardingSteps.length) { skipOnboarding(); createConfetti(); } else updateOnboardingStep(); }
function skipOnboarding() { localStorage.setItem('ot_onboarding_done', '1'); document.getElementById('onboarding-overlay').classList.add('hidden'); }
function resetOnboarding() { localStorage.removeItem('ot_onboarding_done'); currentOnboardingStep = 0; showOnboarding(); }

function renderEmptyState(type) {
    const s = { vehicles: ['truck', 'No Vehicles', 'add-vehicle', 'amber'], drivers: ['users', 'No Staff', 'add-driver', 'blue'], trips: ['route', 'No Trips', 'add-trip', 'indigo'], expenses: ['receipt', 'No Expenses', 'add-expense', 'red'] }[type];
    if (!s) return '';
    return `<div class="empty-state"><div class="floating mb-6"><div class="w-20 h-20 bg-${s[3]}-100 dark:bg-${s[3]}-900/30 rounded-full flex items-center justify-center"><i data-lucide="${s[0]}" class="w-10 h-10 text-${s[3]}-600"></i></div></div><h3 class="font-black text-xl mb-2">${s[1]}</h3><button onclick="switchTab('${s[2]}')" class="btn-primary bg-${s[3]}-600 text-white px-6 mt-4"><i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>Add</button></div>`;
}

let touchStartX = 0, touchCurrentX = 0, currentSwipeEl = null;
function initSwipe() {
    document.querySelectorAll('.swipe-container').forEach(c => {
        const ct = c.querySelector('.swipe-content');
        c.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; currentSwipeEl = c; ct.style.transition = 'none'; }, { passive: true });
        c.addEventListener('touchmove', e => { if (!currentSwipeEl) return; touchCurrentX = e.touches[0].clientX; ct.style.transform = `translateX(${Math.max(-140, Math.min(140, touchCurrentX - touchStartX))}px)`; }, { passive: true });
        c.addEventListener('touchend', () => { if (!currentSwipeEl) return; const ct = currentSwipeEl.querySelector('.swipe-content'); ct.style.transition = 'transform 0.3s'; const d = touchCurrentX - touchStartX; ct.style.transform = d > 70 ? 'translateX(70px)' : d < -70 ? 'translateX(-70px)' : 'translateX(0)'; currentSwipeEl = null; touchStartX = touchCurrentX = 0; });
    });
}
function resetSwipe(el) { el.closest('.swipe-container').querySelector('.swipe-content').style.transform = 'translateX(0)'; }
function editItem(t, id) { currentDetailData = { type: t, id }; switchTab('edit-' + t); }
function deleteItem(t, id) { if (confirm('Delete?')) { db.delete(t + 's', id); switchTab(t + 's'); } }

function updateCompanyName(v) { localStorage.setItem('ot_company_name', v); const el = document.getElementById('sidebar-company-name'); if (el) el.innerText = v || 'OmniTransport'; }

function switchTab(tab, loader = true) {
    document.querySelectorAll('#desktop-sidebar button').forEach(b => b.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400'));
    document.getElementById('side-' + tab)?.classList.add('bg-indigo-50', 'dark:bg-indigo-900/30', 'text-indigo-600', 'dark:text-indigo-400');
    let title = tab.replace('-', ' ').toUpperCase();
    if (tab === 'dashboard') title = 'HOME';
    if (tab === 'drivers') title = 'STAFF';
    if (tab === 'details' && currentDetailData) title = currentDetailData.type.toUpperCase() + ' INFO';
    document.getElementById('app-title').innerText = title;
    
    if (loader && ['dashboard', 'vehicles', 'drivers', 'trips', 'expenses', 'reports'].includes(tab)) {
        const type = tab === 'dashboard' ? 'dashboard' : tab === 'reports' ? 'stats' : tab === 'drivers' ? 'staff' : 'list';
        const count = Math.min(db.get(tab).length || 3, 4);
        document.getElementById('main-content').innerHTML = `<div class="w-full">${renderSkeleton(type, count)}</div>`;
        setTimeout(() => { document.querySelector('.loading-progress')?.remove(); document.getElementById('main-content').innerHTML = `<div class="animate-in w-full">${renderPage(tab)}</div>`; lucide.createIcons(); initSwipe(); if (tab === 'reports') setTimeout(initChart, 100); }, getLoadDuration(type, count) + 100);
    } else {
        document.getElementById('main-content').innerHTML = `<div class="animate-in w-full">${renderPage(tab)}</div>`;
        lucide.createIcons(); initSwipe();
    }
    updateThemeIcon();
}

function switchStaffTab(t) { activeStaffTab = t; document.getElementById('staff-content').innerHTML = renderStaffContent(); document.querySelectorAll('.staff-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t)); lucide.createIcons(); initSwipe(); }
function showFabMenu() { document.getElementById('fab-menu').classList.remove('hidden'); }
function closeFabMenu() { document.getElementById('fab-menu').classList.add('hidden'); }
function toggleTheme() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('ot_theme', d ? 'dark' : 'light'); updateThemeIcon(); }
function updateThemeIcon() { const i = document.getElementById('theme-icon'); if (i) { i.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon'); lucide.createIcons(); } }
function exportData() { const d = { vehicles: db.get('vehicles'), drivers: db.get('drivers'), trips: db.get('trips'), expenses: db.get('expenses'), companyName: localStorage.getItem('ot_company_name') }; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], { type: 'application/json' })); a.download = `OmniTransport_${today()}.json`; a.click(); }
function importData(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); ['vehicles', 'drivers', 'trips', 'expenses'].forEach(k => d[k] && db.set(k, d[k])); if (d.companyName) localStorage.setItem('ot_company_name', d.companyName); createConfetti(); location.reload(); } catch { alert('Invalid file'); } }; r.readAsText(f); }
function viewDetails(t, id) { currentDetailData = { type: t, id }; switchTab('details', false); }
function completeTrip(id) { const arr = db.get('trips'), t = arr.find(x => x.id === id); if (t) { t.status = 'Completed'; db.set('trips', arr); createConfetti(); switchTab('trips'); } }

        if (!trips.length && !vehicles.length) return `<div class="grid grid-cols-2 gap-2 mb-3">${btns.map(([t, i, c, l], idx) => `<button onclick="switchTab('${t}')" class="glass-card p-4 rounded-[5px] flex flex-col items-center gap-2 border-2 border-${c}-100 dark:border-${c}-900/50 card-reveal" style="animation-delay:${idx * 50}ms"><div class="w-10 h-10 bg-${c}-100 dark:bg-${c}-900/50 text-${c}-600 rounded-[5px] flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div><span class="font-black text-[10px] tracking-widest">${l}</span></button>`).join('')}</div>${renderEmptyState('trips')}`;

    if (tab === 'profile') {
        const cn = localStorage.getItem('ot_company_name') || 'OmniTransport', gst = localStorage.getItem('ot_gst_no') || '', isDark = document.documentElement.classList.contains('dark');
        return `<div class="space-y-3"><div class="glass-card rounded-[5px] p-6 text-center border-2 border-slate-200 dark:border-slate-700"><div class="w-20 h-20 mx-auto bg-indigo-100 rounded-full border-4 border-indigo-500 overflow-hidden mb-3"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-full h-full"></div><h2 class="font-black text-xl">Admin</h2><p class="font-bold text-indigo-600">XRV LABS</p></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div><label class="text-xs font-bold text-slate-500">COMPANY</label><input type="text" value="${cn}" class="field-input w-full mt-1" oninput="updateCompanyName(this.value)"></div><div><label class="text-xs font-bold text-slate-500">GST</label><input type="text" value="${gst}" class="field-input w-full mt-1" onchange="localStorage.setItem('ot_gst_no',this.value)"></div></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div class="flex justify-between items-center"><span class="font-bold">Dark Mode</span><button onclick="toggleTheme();switchTab('profile',false)" class="px-4 py-2 ${isDark ? 'bg-indigo-600 text-white' : 'bg-slate-200'} rounded-[5px] font-bold text-sm">${isDark ? 'On' : 'Off'}</button></div><div class="flex justify-between items-center"><span class="font-bold">Tutorial</span><button onclick="resetOnboarding()" class="px-4 py-2 bg-purple-600 text-white rounded-[5px] font-bold text-sm">Replay</button></div></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700"><div class="grid grid-cols-2 gap-3 mb-3"><button onclick="exportData()" class="p-3 bg-blue-50 text-blue-600 rounded-[5px] font-bold border border-blue-200"><i data-lucide="download" class="w-5 h-5 mx-auto mb-1"></i>Export</button><label class="p-3 bg-emerald-50 text-emerald-600 rounded-[5px] font-bold border border-emerald-200 cursor-pointer"><i data-lucide="upload" class="w-5 h-5 mx-auto mb-1"></i>Import<input type="file" class="hidden" accept=".json" onchange="importData(event)"></label></div><button onclick="if(confirm('Erase all?')){localStorage.clear();location.reload()}" class="w-full p-3 bg-red-50 text-red-600 rounded-[5px] font-bold border border-red-200">Erase All</button></div><p class="text-center text-slate-400 text-sm font-bold pb-4">v1.6.0 • XRV LABS</p></div>`;
    }

    // Forms
    if (tab === 'add-vehicle' || tab === 'edit-vehicle') {
        const isEdit = tab.startsWith('edit'); let v = { number: '', type: '10-Wheeler', capacity: '', status: 'Active' };
        if (isEdit && currentDetailData) v = db.get('vehicles').find(x => x.id === currentDetailData.id) || v;
        return `<div class="flex items-center gap-3 mb-4"><button onclick="switchTab('vehicles')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-[5px]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl">${isEdit ? 'EDIT' : 'ADD'} VEHICLE</h3></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div><label class="text-xs font-bold text-slate-500">NUMBER</label><input type="text" id="v-number" value="${v.number}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">TYPE</label><select id="v-type" class="field-input w-full mt-1 bg-white dark:bg-slate-800"><option ${v.type === '6-Wheeler' ? 'selected' : ''}>6-Wheeler</option><option ${v.type === '10-Wheeler' ? 'selected' : ''}>10-Wheeler</option><option ${v.type === '12-Wheeler' ? 'selected' : ''}>12-Wheeler</option><option ${v.type === '14-Wheeler' ? 'selected' : ''}>14-Wheeler</option><option ${v.type === 'Trailer' ? 'selected' : ''}>Trailer</option></select></div><div><label class="text-xs font-bold text-slate-500">CAPACITY</label><input type="text" id="v-capacity" value="${v.capacity}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">STATUS</label><select id="v-status" class="field-input w-full mt-1 bg-white dark:bg-slate-800"><option ${v.status === 'Active' ? 'selected' : ''}>Active</option><option ${v.status === 'Maintenance' ? 'selected' : ''}>Maintenance</option><option ${v.status === 'Inactive' ? 'selected' : ''}>Inactive</option></select></div><button onclick="saveVehicle(${isEdit})" class="btn-primary bg-indigo-600 text-white w-full">${isEdit ? 'Update' : 'Save'}</button></div>`;
    }

    if (tab === 'add-driver' || tab === 'edit-driver') {
        const isEdit = tab.startsWith('edit'); let d = { name: '', phone: '', license: '', salaryType: 'Fixed', baseSalary: '', role: 'Driver' };
        if (isEdit && currentDetailData) d = db.get('drivers').find(x => x.id === currentDetailData.id) || d;
        return `<div class="flex items-center gap-3 mb-4"><button onclick="switchTab('drivers')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-[5px]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl">${isEdit ? 'EDIT' : 'ADD'} STAFF</h3></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div><label class="text-xs font-bold text-slate-500">TYPE</label><select id="d-role" class="field-input w-full mt-1 bg-white dark:bg-slate-800" onchange="document.getElementById('license-field').classList.toggle('hidden',this.value==='Worker')"><option value="Driver" ${d.role === 'Driver' ? 'selected' : ''}>Driver</option><option value="Worker" ${d.role === 'Worker' ? 'selected' : ''}>Worker</option></select></div><div><label class="text-xs font-bold text-slate-500">NAME</label><input type="text" id="d-name" value="${d.name}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">PHONE</label><input type="tel" id="d-phone" value="${d.phone}" class="field-input w-full mt-1"></div><div id="license-field" ${d.role === 'Worker' ? 'class="hidden"' : ''}><label class="text-xs font-bold text-slate-500">LICENSE</label><input type="text" id="d-license" value="${d.license}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">SALARY TYPE</label><select id="d-salaryType" class="field-input w-full mt-1 bg-white dark:bg-slate-800"><option ${d.salaryType === 'Fixed' ? 'selected' : ''}>Fixed</option><option ${d.salaryType === 'Per Trip' ? 'selected' : ''}>Per Trip</option></select></div><div><label class="text-xs font-bold text-slate-500">BASE SALARY</label><input type="number" id="d-baseSalary" value="${d.baseSalary}" class="field-input w-full mt-1"></div><button onclick="saveDriver(${isEdit})" class="btn-primary bg-indigo-600 text-white w-full">${isEdit ? 'Update' : 'Save'}</button></div>`;
    }

    if (tab === 'add-trip' || tab === 'edit-trip') {
        const isEdit = tab.startsWith('edit'); let t = { vehicleId: '', driverId: '', origin: '', dest: '', freightAmount: '', advance: '', date: today(), status: 'Ongoing' };
        if (isEdit && currentDetailData) t = db.get('trips').find(x => x.id === currentDetailData.id) || t;
        const dList = drivers.filter(d => d.role === 'Driver');
        return `<div class="flex items-center gap-3 mb-4"><button onclick="switchTab('trips')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-[5px]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl">${isEdit ? 'EDIT' : 'NEW'} TRIP</h3></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div><label class="text-xs font-bold text-slate-500">VEHICLE</label><select id="t-vehicle" class="field-input w-full mt-1 bg-white dark:bg-slate-800">${vehicles.map(v => `<option value="${v.id}" ${t.vehicleId === v.id ? 'selected' : ''}>${v.number}</option>`).join('')}</select></div><div><label class="text-xs font-bold text-slate-500">DRIVER</label><select id="t-driver" class="field-input w-full mt-1 bg-white dark:bg-slate-800">${dList.map(d => `<option value="${d.id}" ${t.driverId === d.id ? 'selected' : ''}>${d.name}</option>`).join('')}</select></div><div class="grid grid-cols-2 gap-3"><div><label class="text-xs font-bold text-slate-500">ORIGIN</label><input type="text" id="t-origin" value="${t.origin}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">DEST</label><input type="text" id="t-dest" value="${t.dest}" class="field-input w-full mt-1"></div></div><div class="grid grid-cols-2 gap-3"><div><label class="text-xs font-bold text-slate-500">FREIGHT</label><input type="number" id="t-freight" value="${t.freightAmount}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">ADVANCE</label><input type="number" id="t-advance" value="${t.advance}" class="field-input w-full mt-1"></div></div><div><label class="text-xs font-bold text-slate-500">DATE</label><input type="date" id="t-date" value="${t.date}" class="field-input w-full mt-1"></div><button onclick="saveTrip(${isEdit})" class="btn-primary bg-indigo-600 text-white w-full">${isEdit ? 'Update' : 'Save'}</button></div>`;
    }

    if (tab === 'add-expense' || tab === 'edit-expense') {
        const isEdit = tab.startsWith('edit'); let e = { type: 'Fuel', amount: '', vehicleId: '', driverId: '', date: today(), notes: '' };
        if (isEdit && currentDetailData) e = db.get('expenses').find(x => x.id === currentDetailData.id) || e;
        return `<div class="flex items-center gap-3 mb-4"><button onclick="switchTab('expenses')" class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-[5px]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-xl">${isEdit ? 'EDIT' : 'ADD'} EXPENSE</h3></div><div class="glass-card rounded-[5px] p-4 border-2 border-slate-200 dark:border-slate-700 space-y-3"><div><label class="text-xs font-bold text-slate-500">TYPE</label><select id="e-type" class="field-input w-full mt-1 bg-white dark:bg-slate-800" onchange="document.getElementById('vehicle-field').classList.toggle('hidden',this.value==='Salary');document.getElementById('driver-field').classList.toggle('hidden',this.value!=='Salary')"><option ${e.type === 'Fuel' ? 'selected' : ''}>Fuel</option><option ${e.type === 'Maintenance' ? 'selected' : ''}>Maintenance</option><option ${e.type === 'Toll' ? 'selected' : ''}>Toll</option><option ${e.type === 'Salary' ? 'selected' : ''}>Salary</option><option ${e.type === 'Other' ? 'selected' : ''}>Other</option></select></div><div><label class="text-xs font-bold text-slate-500">AMOUNT</label><input type="number" id="e-amount" value="${e.amount}" class="field-input w-full mt-1"></div><div id="vehicle-field" ${e.type === 'Salary' ? 'class="hidden"' : ''}><label class="text-xs font-bold text-slate-500">VEHICLE</label><select id="e-vehicle" class="field-input w-full mt-1 bg-white dark:bg-slate-800"><option value="">None</option>${vehicles.map(v => `<option value="${v.id}" ${e.vehicleId === v.id ? 'selected' : ''}>${v.number}</option>`).join('')}</select></div><div id="driver-field" ${e.type !== 'Salary' ? 'class="hidden"' : ''}><label class="text-xs font-bold text-slate-500">STAFF</label><select id="e-driver" class="field-input w-full mt-1 bg-white dark:bg-slate-800">${drivers.map(d => `<option value="${d.id}" ${e.driverId === d.id ? 'selected' : ''}>${d.name}</option>`).join('')}</select></div><div><label class="text-xs font-bold text-slate-500">DATE</label><input type="date" id="e-date" value="${e.date}" class="field-input w-full mt-1"></div><div><label class="text-xs font-bold text-slate-500">NOTES</label><textarea id="e-notes" class="field-input w-full mt-1 h-16 resize-none">${e.notes}</textarea></div><button onclick="saveExpense(${isEdit})" class="btn-primary bg-red-500 text-white w-full">${isEdit ? 'Update' : 'Save'}</button></div>`;
    }

    return '<p>Page not found</p>';
}

function saveVehicle(isEdit) {
    const v = { id: isEdit && currentDetailData ? currentDetailData.id : 'V' + Date.now(), number: document.getElementById('v-number').value.toUpperCase(), type: document.getElementById('v-type').value, capacity: document.getElementById('v-capacity').value, status: document.getElementById('v-status').value };
    if (!v.number) return alert('Enter number');
    if (isEdit) { const arr = db.get('vehicles'), i = arr.findIndex(x => x.id === v.id); if (i > -1) { arr[i] = v; db.set('vehicles', arr); } } else { db.push('vehicles', v); createConfetti(); }
    switchTab('vehicles');
}

function saveDriver(isEdit) {
    const role = document.getElementById('d-role').value;
    const d = { id: isEdit && currentDetailData ? currentDetailData.id : (role === 'Driver' ? 'D' : 'W') + Date.now(), name: document.getElementById('d-name').value, phone: document.getElementById('d-phone').value, license: role === 'Driver' ? document.getElementById('d-license').value : '', salaryType: document.getElementById('d-salaryType').value, baseSalary: +document.getElementById('d-baseSalary').value || 0, role };
    if (!d.name) return alert('Enter name');
    if (isEdit) { const arr = db.get('drivers'), i = arr.findIndex(x => x.id === d.id); if (i > -1) { arr[i] = d; db.set('drivers', arr); } } else { db.push('drivers', d); createConfetti(); }
    activeStaffTab = role === 'Driver' ? 'drivers' : 'workers';
    switchTab('drivers');
}

function saveTrip(isEdit) {
    const t = { id: isEdit && currentDetailData ? currentDetailData.id : 'T' + Date.now(), vehicleId: document.getElementById('t-vehicle').value, driverId: document.getElementById('t-driver').value, origin: document.getElementById('t-origin').value, dest: document.getElementById('t-dest').value, freightAmount: +document.getElementById('t-freight').value || 0, advance: +document.getElementById('t-advance').value || 0, date: document.getElementById('t-date').value, status: isEdit ? (db.get('trips').find(x => x.id === currentDetailData.id)?.status || 'Ongoing') : 'Ongoing' };
    if (!t.origin || !t.dest) return alert('Enter origin & destination');
    if (isEdit) { const arr = db.get('trips'), i = arr.findIndex(x => x.id === t.id); if (i > -1) { arr[i] = t; db.set('trips', arr); } } else { db.push('trips', t); createConfetti(); }
    switchTab('trips');
}

function saveExpense(isEdit) {
    const e = { id: isEdit && currentDetailData ? currentDetailData.id : 'E' + Date.now(), type: document.getElementById('e-type').value, amount: +document.getElementById('e-amount').value || 0, vehicleId: document.getElementById('e-vehicle')?.value || '', driverId: document.getElementById('e-driver')?.value || '', date: document.getElementById('e-date').value, notes: document.getElementById('e-notes').value };
    if (!e.amount) return alert('Enter amount');
    if (isEdit) { const arr = db.get('expenses'), i = arr.findIndex(x => x.id === e.id); if (i > -1) { arr[i] = e; db.set('expenses', arr); } } else db.push('expenses', e);
    switchTab('expenses');
}

function initChart() {
    const ctx = document.getElementById('financeChart');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    const trips = db.get('trips'), expenses = db.get('expenses');
    chartInstance = new Chart(ctx, { type: 'bar', data: { labels: ['Total'], datasets: [{ label: 'Income', data: [trips.reduce((s, t) => s + t.freightAmount, 0)], backgroundColor: '#4f46e5', borderRadius: 5 }, { label: 'Expense', data: [expenses.reduce((s, e) => s + e.amount, 0)], backgroundColor: '#ef4444', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
}

window.onload = () => { updateThemeIcon(); updateCompanyName(localStorage.getItem('ot_company_name')); setTimeout(showOnboarding, 500); };
switchTab('dashboard');
</script>
</body>
</html>
