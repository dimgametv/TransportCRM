<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App | OmniTransport</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6 text-center font-sans">

    <div class="bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 shadow-2xl max-w-sm w-full relative overflow-hidden">
        
        <h2 class="text-2xl font-black mt-2 mb-1 text-emerald-400 uppercase tracking-wider">Driver Console</h2>
        <p class="text-slate-400 font-bold mb-6 text-sm">Vehicle: RJ-14-GD-1234</p>
        
        <div class="w-24 h-24 bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-slate-600 relative">
            <span id="radar-pulse" class="absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-0 transition-opacity duration-300"></span>
            <span class="text-4xl relative z-10">📡</span>
        </div>
        
        <div id="status-text" class="p-4 bg-slate-900 rounded-xl text-xs font-mono text-emerald-400 break-words mb-6 border border-slate-700 text-left h-32 overflow-y-auto flex flex-col justify-end">
            > Standby mode...<br>
            > Ready for dispatch.
        </div>

        <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-xl uppercase tracking-wider transition-all active:scale-95 shadow-lg shadow-blue-900/50">
            Activate System
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLSOpqIBUdvCFy8C2drX16aKzeUO9Wps4",
            authDomain: "omnicrm-0611.firebaseapp.com",
            databaseURL: "https://omnicrm-0611-default-rtdb.firebaseio.com",
            projectId: "omnicrm-0611",
            storageBucket: "omnicrm-0611.firebasestorage.app",
            messagingSenderId: "589912209026",
            appId: "1:589912209026:web:3eb29be71c19f3935f269b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const driverId = "D1"; 
        let lastSentTime = 0; 
        let wakeLock = null; 
        let currentPos = { lat: 0, lng: 0, accuracy: 0 };

        const statusBox = document.getElementById('status-text');
        const radarPulse = document.getElementById('radar-pulse');

        function logStatus(msg, color = 'emerald-400') {
            statusBox.innerHTML += `<span class="text-${color} mt-1 block">> ${msg}</span>`;
            statusBox.scrollTop = statusBox.scrollHeight;
        }

        // PING LISTENER: Wait for Owner to click "SYNC NOW"
        onValue(ref(db, 'requests/' + driverId), (snapshot) => {
            const reqTime = snapshot.val();
            // Agar naya request aaya hai
            if (reqTime && reqTime > lastSentTime) {
                if (currentPos.lat !== 0 && currentPos.accuracy <= 100) {
                    logStatus("⚡ PING RECEIVED! Sending Coordinates...", "blue-400");
                    
                    // Visual Ping Effect
                    radarPulse.classList.replace('opacity-0', 'animate-ping');
                    setTimeout(() => radarPulse.classList.replace('animate-ping', 'opacity-0'), 1500);

                    // Turant Firebase par current GPS lock bhej do
                    const now = Date.now();
                    set(ref(db, 'tracking/' + driverId), {
                        lat: currentPos.lat,
                        lng: currentPos.lng,
                        timestamp: now
                    });
                    lastSentTime = now;
                    logStatus("📍 Location dispatched to Owner.", "emerald-400");
                } else {
                    logStatus("⚠️ Ping received, but GPS signal is weak/searching.", "amber-400");
                }
            }
        });

        async function requestWakeLock() {
            try { wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) { console.error('Wake Lock error:', err); }
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            if (navigator.geolocation) {
                document.getElementById('start-btn').style.display = 'none';
                await requestWakeLock();
                logStatus("Radar ON. Locking GPS...");
                
                // GPS continuously track karega, par automatic BHEJEGA NAHI.
                // Ye zaroori hai taaki 'Sync Now' dabate hi turant location mil jaye (bina 5 sec wait kiye).
                navigator.geolocation.watchPosition((position) => {
                    currentPos.lat = position.coords.latitude;
                    currentPos.lng = position.coords.longitude;
                    currentPos.accuracy = position.coords.accuracy;
                    
                    // Bas UI par lock status dikhayenge
                    if(document.getElementById('lock-status')) {
                        document.getElementById('lock-status').innerText = `Locked (${Math.round(currentPos.accuracy)}m)`;
                    } else {
                        logStatus(`GPS Ready. <span id="lock-status" class="text-slate-400 text-xs ml-2">Locked (${Math.round(currentPos.accuracy)}m)</span>`);
                    }
                }, (error) => {
                    logStatus(`GPS Error: ${error.message}`, 'red-500');
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
            } else {
                alert("Geolocation not supported.");
            }
        });
    </script>
</body>
</html>
